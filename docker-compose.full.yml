version: '3.9'

# ============================================================================
# Reaper Full Stack
# ============================================================================
# This docker-compose includes all Reaper services:
# - Management Server (centralized policy management)
# - Platform (legacy policy management - optional)
# - Agent (policy enforcement)
# - PostgreSQL (management database)
# - Observability stack (Prometheus, Grafana, Tempo, Loki)
#
# Usage:
#   docker compose -f docker-compose.full.yml up -d
#
# Access:
#   - Management API: http://localhost:3000
#   - Agent API: http://localhost:8080
#   - Platform API: http://localhost:8081
#   - Grafana: http://localhost:3001 (admin/admin)
#   - Prometheus: http://localhost:9090
# ============================================================================

services:
  # ==========================================================================
  # PostgreSQL - Management Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: reaper-postgres
    environment:
      POSTGRES_USER: reaper
      POSTGRES_PASSWORD: reaper_secret
      POSTGRES_DB: reaper_management
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - reaper-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reaper -d reaper_management"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # Reaper Management Server - Centralized Policy Management
  # ==========================================================================
  management:
    build:
      context: .
      dockerfile: services/reaper-management/Dockerfile
    container_name: reaper-management
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info,reaper_management=debug
      - REAPER_PORT=3000
      - REAPER_BIND_ADDRESS=0.0.0.0
      - REAPER_DATABASE_URL=postgres://reaper:reaper_secret@postgres:5432/reaper_management
      - REAPER_JWT_SECRET=development-jwt-secret-change-in-production
      - REAPER_STORAGE_TYPE=filesystem
      - REAPER_STORAGE_PATH=/var/lib/reaper/storage
    volumes:
      - management-storage:/var/lib/reaper/storage
    networks:
      - reaper-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ==========================================================================
  # Reaper Platform - Legacy Policy Management (optional)
  # ==========================================================================
  platform:
    build:
      context: .
      dockerfile: services/reaper-platform/Dockerfile
    container_name: reaper-platform
    ports:
      - "8081:8081"
    environment:
      - RUST_LOG=info,reaper_platform=debug
      - REAPER_BIND_ADDR=0.0.0.0:8081
    volumes:
      - platform-data:/data
    networks:
      - reaper-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ==========================================================================
  # Reaper Agent - Policy Enforcement (Standalone Mode)
  # ==========================================================================
  agent:
    build:
      context: .
      dockerfile: services/reaper-agent/Dockerfile
    container_name: reaper-agent
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info,reaper_agent=debug
      - REAPER_BIND_ADDR=0.0.0.0:8080
      - PLATFORM_URL=http://platform:8081
      # OpenTelemetry
      - OTEL_ENABLED=true
      - OTEL_ENDPOINT=http://tempo:4317
      # Managed mode (optional - uncomment to connect to management server)
      # - REAPER_MANAGEMENT_ENABLED=true
      # - REAPER_MANAGEMENT_URL=http://management:3000
      # - REAPER_MANAGEMENT_ORG=default
      # - REAPER_MANAGEMENT_API_KEY=your-api-key-here
    volumes:
      - agent-data:/data
      - ./policies:/policies:ro
    networks:
      - reaper-net
    depends_on:
      platform:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ==========================================================================
  # Reaper Agent - Managed Mode (connects to Management Server)
  # ==========================================================================
  agent-managed:
    build:
      context: .
      dockerfile: services/reaper-agent/Dockerfile
    container_name: reaper-agent-managed
    ports:
      - "8082:8080"
    environment:
      - RUST_LOG=info,reaper_agent=debug
      - REAPER_BIND_ADDR=0.0.0.0:8080
      # Management connection
      - REAPER_MANAGEMENT_ENABLED=true
      - REAPER_MANAGEMENT_URL=http://management:3000
      - REAPER_MANAGEMENT_ORG=default
      - REAPER_MANAGEMENT_API_KEY=${REAPER_API_KEY:-test-api-key}
      # OpenTelemetry
      - OTEL_ENABLED=true
      - OTEL_ENDPOINT=http://tempo:4317
    volumes:
      - agent-managed-data:/data
    networks:
      - reaper-net
    depends_on:
      management:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    profiles:
      - managed  # Only starts with: docker compose --profile managed up

  # ==========================================================================
  # Prometheus - Metrics Collection
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: reaper-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - reaper-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Grafana - Visualization
  # ==========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: reaper-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - reaper-net
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  # ==========================================================================
  # Tempo - Distributed Tracing
  # ==========================================================================
  tempo:
    image: grafana/tempo:latest
    container_name: reaper-tempo
    ports:
      - "3200:3200"   # Tempo API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    command:
      - -config.file=/etc/tempo/tempo.yaml
    networks:
      - reaper-net
    restart: unless-stopped

  # ==========================================================================
  # Loki - Log Aggregation
  # ==========================================================================
  loki:
    image: grafana/loki:latest
    container_name: reaper-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - reaper-net
    restart: unless-stopped

  # ==========================================================================
  # Promtail - Log Shipping
  # ==========================================================================
  promtail:
    image: grafana/promtail:latest
    container_name: reaper-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - reaper-net
    depends_on:
      - loki
    restart: unless-stopped

networks:
  reaper-net:
    driver: bridge
    name: reaper-network

volumes:
  postgres-data:
    name: reaper-postgres-data
  management-storage:
    name: reaper-management-storage
  platform-data:
    name: reaper-platform-data
  agent-data:
    name: reaper-agent-data
  agent-managed-data:
    name: reaper-agent-managed-data
  prometheus-data:
    name: reaper-prometheus-data
  grafana-data:
    name: reaper-grafana-data
  tempo-data:
    name: reaper-tempo-data
  loki-data:
    name: reaper-loki-data
