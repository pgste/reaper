apiVersion: apps/v1
kind: Deployment
metadata:
  name: reaper-agent-bench
  namespace: reaper
  labels:
    app.kubernetes.io/name: reaper-agent-bench
    app.kubernetes.io/component: enforcement
    app.kubernetes.io/part-of: reaper-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: reaper-agent-bench
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reaper-agent-bench
        app.kubernetes.io/component: enforcement
        app.kubernetes.io/part-of: reaper-platform
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      containers:
        # --- Reaper Agent: policy evaluation engine ---
        - name: agent
          image: registry.digitalocean.com/reaper-registry/reaper:agent-v0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: reaper-agent-config
          volumeMounts:
            - name: uds-socket
              mountPath: /var/run/reaper
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5

        # --- Reaper Bench: benchmark dashboard ---
        - name: bench
          image: registry.digitalocean.com/reaper-registry/reaper:bench-v0.1.0
          imagePullPolicy: Always
          args:
            - "--agent-uds-path"
            - "/var/run/reaper/agent.sock"
          ports:
            - name: dashboard
              containerPort: 3000
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info,reaper_bench=info"
            - name: EOPA_URL
              value: "http://localhost:8181"
          volumeMounts:
            - name: uds-socket
              mountPath: /var/run/reaper
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: dashboard
            initialDelaySeconds: 8
            periodSeconds: 5

        # --- Enterprise OPA: comparison benchmark target ---
        - name: eopa
          image: ghcr.io/styrainc/enterprise-opa:latest
          args: ["run", "--server", "--addr=0.0.0.0:8181"]
          ports:
            - name: opa
              containerPort: 8181
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: opa
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: opa
            initialDelaySeconds: 3
            periodSeconds: 5

      volumes:
        - name: uds-socket
          emptyDir:
            medium: Memory
