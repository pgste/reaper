# Complete, self-contained decision-log pipeline:
#
#     Reaper agent ──NDJSON file──▶ Vector ──batched inserts──▶ ClickHouse
#
# One command from the repo root:
#
#   docker compose -f deploy/decision-logs/docker-compose.yml up -d --build
#
# The agent runs in FULL audit mode (every decision — allows included — ships
# to ClickHouse). Try it:
#
#   # load data + a policy, then evaluate (see docs/getting-started/)
#   curl -s -X POST localhost:8080/api/v1/fast-messages -H 'Content-Type: application/json' \
#     -d '{"principal":"alice","action":"read","resource":"doc1","policy_name":"demo"}'
#
#   # watch decisions land in the store
#   docker compose -f deploy/decision-logs/docker-compose.yml exec clickhouse \
#     clickhouse-client -q "SELECT timestamp, principal, action, resource, decision \
#                           FROM reaper_audit.decisions ORDER BY timestamp DESC LIMIT 10"
#
# Volume knobs (env): DECISION_LOG_MODE=full|sampled|denies (default full),
# DECISION_LOG_SAMPLE_ALLOW_RATE=0.05 (with mode=sampled).
#
# NOTE: the main docker-compose.yml offers the same pipeline as the `audit`
# profile, composable with the platform/management stacks.

services:
  agent:
    build:
      context: ../..
      dockerfile: services/reaper-agent/Dockerfile
    image: reaper-agent:latest
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info,reaper_agent=info
      - REAPER_AGENT_BIND_ADDRESS=0.0.0.0
      - REAPER_AGENT_PORT=8080
      # Decision logging: full audit mode -> every decision ships.
      - REAPER_DECISION_LOG_ENABLED=true
      - REAPER_DECISION_LOG_MODE=${DECISION_LOG_MODE:-full}
      - REAPER_DECISION_LOG_SAMPLE_ALLOW_RATE=${DECISION_LOG_SAMPLE_ALLOW_RATE:-1.0}
      - REAPER_DECISION_LOG_FILE=/var/log/reaper/decisions.ndjson
    volumes:
      - decision-logs:/var/log/reaper
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"     # HTTP (Vector inserts + management query API)
      - "9000:9000"     # native
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ./clickhouse-schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ch-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  vector:
    image: timberio/vector:0.41.1-debian
    depends_on:
      clickhouse:
        condition: service_healthy
      agent:
        condition: service_started
    environment:
      - REAPER_TENANT_ID=${REAPER_TENANT_ID:-}
    volumes:
      - ./vector-file.toml:/etc/vector/vector.toml:ro
      - decision-logs:/var/log/reaper:ro
      - vector-buffer:/var/lib/vector   # disk WAL survives restarts

  # Optional S3-compatible WORM archive for the compliance tier.
  # minio:
  #   image: minio/minio
  #   command: server /data --console-address ":9001"
  #   ports: ["9001:9001"]
  #   environment:
  #     MINIO_ROOT_USER: reaper
  #     MINIO_ROOT_PASSWORD: change-me-please
  #   volumes: [minio-data:/data]

volumes:
  decision-logs:
  ch-data:
  vector-buffer:
  # minio-data:
