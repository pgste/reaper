# Reaper Benchmark Kubernetes Deployment
#
# Prerequisites:
# 1. Generate TLS certificates:
#    ./scripts/generate-certs.sh
#
# 2. Create TLS secret:
#    kubectl create secret generic reaper-tls \
#      --from-file=ca.crt=certs/ca.crt \
#      --from-file=server.crt=certs/server.crt \
#      --from-file=server.key=certs/server.key \
#      --from-file=client.crt=certs/client.crt \
#      --from-file=client.key=certs/client.key
#
# 3. Deploy:
#    kubectl apply -f deploy/kubernetes/benchmark/
#
# 4. Port forward to access:
#    kubectl port-forward svc/reaper-bench 3000:3000
---
apiVersion: v1
kind: Namespace
metadata:
  name: reaper-benchmark
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: benchmark-policy
  namespace: reaper-benchmark
data:
  benchmark.reap: |
    policy benchmark_rbac {
        description = "RBAC policy for benchmark testing"

        allow {
            principal.role == "admin"
        }

        allow {
            principal.role == "engineer"
            action in ["read", "write", "update"]
        }

        allow {
            principal.role == "viewer"
            action == "read"
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reaper-agent
  namespace: reaper-benchmark
  labels:
    app: reaper-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reaper-agent
  template:
    metadata:
      labels:
        app: reaper-agent
    spec:
      containers:
        - name: agent
          image: reaper-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          env:
            - name: REAPER_AGENT_PORT
              value: "8443"
            - name: REAPER_TLS_ENABLED
              value: "true"
            - name: REAPER_TLS_CERT
              value: /certs/server.crt
            - name: REAPER_TLS_KEY
              value: /certs/server.key
            - name: REAPER_TLS_CA
              value: /certs/ca.crt
            - name: REAPER_TLS_REQUIRE_CLIENT_CERT
              value: "true"
            - name: REAPER_CACHE_ENABLED
              value: "false"
            - name: RUST_LOG
              value: "info"
          args:
            - --bootstrap-policies=/policies
          volumeMounts:
            - name: tls
              mountPath: /certs
              readOnly: true
            - name: policies
              mountPath: /policies
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "128Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /live
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tls
          secret:
            secretName: reaper-tls
        - name: policies
          configMap:
            name: benchmark-policy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reaper-bench
  namespace: reaper-benchmark
  labels:
    app: reaper-bench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reaper-bench
  template:
    metadata:
      labels:
        app: reaper-bench
    spec:
      containers:
        - name: bench
          image: reaper-bench:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: REAPER_AGENT_URL
              value: "https://reaper-agent:8443"
            - name: REAPER_TLS_CA
              value: /certs/ca.crt
            - name: REAPER_TLS_CERT
              value: /certs/client.crt
            - name: REAPER_TLS_KEY
              value: /certs/client.key
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: tls
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tls
          secret:
            secretName: reaper-tls
---
apiVersion: v1
kind: Service
metadata:
  name: reaper-agent
  namespace: reaper-benchmark
spec:
  selector:
    app: reaper-agent
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: reaper-bench
  namespace: reaper-benchmark
spec:
  selector:
    app: reaper-bench
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  type: LoadBalancer
