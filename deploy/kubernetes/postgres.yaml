# =============================================================================
# PostgreSQL - Kubernetes StatefulSet for Reaper Management
# =============================================================================
# *** DEV / DEMO ONLY — NOT AN HA POSTURE ***
# Single replica, no failover, no WAL archiving, no backups: losing this pod's
# PV loses the policy/audit source-of-truth. For anything production-grade use
# either:
#   * a MANAGED HA Postgres (RDS / Cloud SQL / Azure Flexible Server) — the
#     recommended default; point DATABASE_URL at its stable endpoint, or
#   * the self-hosted CloudNativePG cluster: postgres-cnpg.yaml (3 instances,
#     automatic failover, continuous WAL archiving + PITR) plus the nightly
#     postgres-restore-check.yaml verification job.
# See docs/deployment/CONTROL_PLANE_HA_DR.md for both paths and the
# RPO/RTO targets.
#
# Deploy with: kubectl apply -f postgres.yaml
# =============================================================================

---
# ConfigMap for PostgreSQL configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: reaper
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
data:
  POSTGRES_DB: "reaper_management"
  POSTGRES_USER: "reaper"
  # PostgreSQL tuning for Reaper workload
  POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"

---
# Secret for PostgreSQL credentials
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: reaper
  labels:
    app.kubernetes.io/name: postgres
type: Opaque
stringData:
  # Change in production!
  POSTGRES_PASSWORD: "change-this-password-in-production"
  # Connection URL for management server
  DATABASE_URL: "postgres://reaper:change-this-password-in-production@postgres:5432/reaper_management"

---
# StatefulSet for PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: reaper
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - reaper
                - -d
                - reaper_management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - reaper
                - -d
                - reaper_management
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsUser: 999
            runAsGroup: 999
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
        storageClassName: standard

---
# Headless Service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: reaper
  labels:
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres

---
# Regular Service for external access within cluster
apiVersion: v1
kind: Service
metadata:
  name: reaper-postgres
  namespace: reaper
  labels:
    app.kubernetes.io/name: postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres
