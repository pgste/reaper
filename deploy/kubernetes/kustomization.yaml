# =============================================================================
# Reaper Kubernetes Kustomization
# =============================================================================
# Deploy with: kubectl apply -k deploy/kubernetes/
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: reaper

namespace: reaper

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/part-of: reaper-platform
  app.kubernetes.io/managed-by: kustomize

# Resources to include
# NOTE: postgres.yaml is DEV/DEMO ONLY (single replica, no HA/backup). For
# production replace it with a managed HA Postgres endpoint, or swap in the
# CloudNativePG manifests (postgres-cnpg.yaml + postgres-restore-check.yaml,
# operator required) — see docs/deployment/CONTROL_PLANE_HA_DR.md.
resources:
  - namespace.yaml
  - postgres.yaml
  - reaper-management.yaml
  - reaper-platform.yaml
  - reaper-agent.yaml
  - ingress.yaml

# Images - override in overlays for different environments
images:
  - name: reaper-management
    newName: reaper-management
    newTag: latest
  - name: reaper-platform
    newName: reaper-platform
    newTag: latest
  - name: reaper-agent
    newName: reaper-agent
    newTag: latest

# ConfigMap generator for common configuration
configMapGenerator:
  - name: reaper-common-config
    literals:
      - RUST_LOG=info
      - OTEL_ENABLED=true

# Secret generator (for development only - use sealed secrets or external-secrets in production)
# secretGenerator:
#   - name: reaper-common-secrets
#     literals:
#       - JWT_SECRET=change-me

# Patches for environment-specific customization
# patches:
#   - path: patches/production-resources.yaml
#     target:
#       kind: Deployment
