# =============================================================================
# Reaper Platform - Kubernetes Deployment
# =============================================================================
# Deploy with: kubectl apply -f reaper-platform.yaml
# =============================================================================

---
# ConfigMap for Platform configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: reaper-platform-config
  namespace: reaper
  labels:
    app.kubernetes.io/name: reaper-platform
    app.kubernetes.io/component: platform
data:
  RUST_LOG: "info,reaper_platform=info"
  REAPER_PLATFORM_BIND_ADDRESS: "0.0.0.0"
  REAPER_PLATFORM_PORT: "8081"

---
# PersistentVolumeClaim for platform data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reaper-platform-data
  namespace: reaper
  labels:
    app.kubernetes.io/name: reaper-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reaper-platform
  namespace: reaper
  labels:
    app.kubernetes.io/name: reaper-platform
    app.kubernetes.io/component: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: reaper-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reaper-platform
        app.kubernetes.io/component: platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics/prometheus"
    spec:
      serviceAccountName: reaper-platform
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: platform
          image: reaper-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: reaper-platform-config
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: reaper-platform-data

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: reaper-platform
  namespace: reaper
  labels:
    app.kubernetes.io/name: reaper-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: reaper-platform

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reaper-platform
  namespace: reaper
  labels:
    app.kubernetes.io/name: reaper-platform

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reaper-platform
  namespace: reaper
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reaper-platform
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: reaper-platform
  namespace: reaper
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reaper-platform
