# =============================================================================
# Nightly backup restore-verification (self-hosted / CNPG path)
# =============================================================================
# "A backup that hasn't been restored is not a backup." Every night this
# CronJob restores the LATEST reaper-pg backup (base backup + WAL replay)
# into a throwaway single-instance cluster in the reaper-restore-check
# namespace, smoke-queries it, and tears it down. Job failure = backups are
# not trustworthy => alert on kube_job_status_failed for this CronJob.
#
# Prerequisites:
#   * CloudNativePG operator installed (same as postgres-cnpg.yaml)
#   * the reaper-pg-backup-creds secret duplicated into the
#     reaper-restore-check namespace (read-only credentials suffice)
#
# Bounded at 20 minutes for restore + replay — comfortably inside the 30 min
# RTO target; a restore that takes longer fails the job loudly.
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: reaper-restore-check
  labels:
    app.kubernetes.io/name: reaper-pg-restore-check
    app.kubernetes.io/part-of: reaper-platform

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: restore-check
  namespace: reaper-restore-check

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: restore-check
  namespace: reaper-restore-check
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: restore-check
  namespace: reaper-restore-check
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: restore-check
subjects:
  - kind: ServiceAccount
    name: restore-check
    namespace: reaper-restore-check

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reaper-pg-restore-check
  namespace: reaper-restore-check
  labels:
    app.kubernetes.io/name: reaper-pg-restore-check
    app.kubernetes.io/component: database-backup
spec:
  schedule: "30 3 * * *"          # nightly, after the 02:15 base backup
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0             # a failed restore must page, not retry silently
      activeDeadlineSeconds: 1800 # hard 30-minute ceiling (RTO target)
      template:
        metadata:
          labels:
            app.kubernetes.io/name: reaper-pg-restore-check
        spec:
          serviceAccountName: restore-check
          restartPolicy: Never
          containers:
            - name: restore-check
              image: bitnami/kubectl:1.30
              command: ["/bin/bash", "-ceu"]
              args:
                - |
                  NS=reaper-restore-check
                  CLUSTER=reaper-pg-verify
                  START=$(date +%s)

                  kubectl -n "$NS" get secret reaper-pg-backup-creds >/dev/null \
                    || { echo "restore-check: FAIL — reaper-pg-backup-creds missing in $NS"; exit 1; }

                  # Clean slate (a leftover cluster from a failed run must not
                  # mask this run's result).
                  kubectl -n "$NS" delete cluster "$CLUSTER" --ignore-not-found --wait=true

                  # Throwaway cluster restored from the LATEST backup + WAL.
                  cat <<EOF | kubectl -n "$NS" apply -f -
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata:
                    name: $CLUSTER
                  spec:
                    instances: 1
                    imageName: ghcr.io/cloudnative-pg/postgresql:16
                    storage:
                      size: 20Gi
                    bootstrap:
                      recovery:
                        source: reaper-pg
                    externalClusters:
                      - name: reaper-pg
                        barmanObjectStore:
                          destinationPath: s3://reaper-pg-backups/
                          endpointURL: https://REPLACE-WITH-S3-ENDPOINT
                          s3Credentials:
                            accessKeyId:
                              name: reaper-pg-backup-creds
                              key: ACCESS_KEY_ID
                            secretAccessKey:
                              name: reaper-pg-backup-creds
                              key: SECRET_ACCESS_KEY
                          wal:
                            compression: gzip
                  EOF

                  # Restore + replay must finish inside 20 min.
                  kubectl -n "$NS" wait --for=condition=Ready \
                    "cluster/$CLUSTER" --timeout=1200s

                  # Smoke queries through the restored primary.
                  POD="$CLUSTER-1"
                  kubectl -n "$NS" exec "$POD" -c postgres -- \
                    psql -U postgres -d reaper_management -tAc "SELECT 1" | grep -qx 1
                  ORGS=$(kubectl -n "$NS" exec "$POD" -c postgres -- \
                    psql -U postgres -d reaper_management -tAc \
                    "SELECT count(*) FROM organizations")
                  POLICIES=$(kubectl -n "$NS" exec "$POD" -c postgres -- \
                    psql -U postgres -d reaper_management -tAc \
                    "SELECT count(*) FROM policies")

                  kubectl -n "$NS" delete cluster "$CLUSTER" --wait=false

                  END=$(date +%s)
                  echo "restore-check: OK (restore=$((END - START))s, organizations=$ORGS, policies=$POLICIES)"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
