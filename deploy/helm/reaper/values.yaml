# =============================================================================
# Reaper Helm Chart - Default Values
# =============================================================================

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""

# =============================================================================
# Reaper Management Server
# =============================================================================
management:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/pgste/reaper/reaper-management
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000

  # Decision-log query API: point at the ClickHouse the Vector pipeline ships
  # into (deploy/decision-logs/) to enable GET /api/v1/orgs/{org}/decisions.
  # Credentials go in an existing Secret (keys: REAPER_CLICKHOUSE_USER,
  # REAPER_CLICKHOUSE_PASSWORD) referenced via existingSecret.
  decisionLogs:
    clickhouseUrl: ""
    clickhouseDatabase: reaper_audit
    existingSecret: ""

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: management.reaper.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Deployment rollout strategy. maxUnavailable: 0 + maxSurge: 1 gives
  # zero-gap upgrades: a new pod must be Ready before an old one is taken
  # out (Plan 11 Phase B fleet-upgrade posture).
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  config:
    logLevel: info
    storageType: filesystem
    storagePath: /var/lib/reaper/storage
    # Governed promotion. The managed control plane defaults to dual-control
    # (two-person / four-eyes): a promote/rollback opens a change request that a
    # *different* principal must approve before the bundle goes live. Set to
    # "disabled" for a single operator / fully-automated pipeline, or keep
    # dual-control and set allowSelfApproval=true for a lone service account
    # that both requests and executes.
    promotionApproval: dual_control
    allowSelfApproval: false

  secrets:
    jwtSecret: ""  # Must be set in production
    existingSecret: ""  # Use existing secret instead

  # Local bundle-blob storage. NOTE (Plan 11 Phase B / ADR-3): a
  # ReadWriteOnce PVC pins every management replica onto one node and blocks
  # clean multi-node scale-out. For a truly redundant control plane either
  # set enabled=false and use shared bundle storage (S3 — see
  # management.config.storageType), or use a ReadWriteMany storage class.
  # The DB (Postgres) is the source of truth; this volume only caches
  # compiled bundle blobs. See docs/deployment/CONTROL_PLANE_HA_DR.md §7.
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# =============================================================================
# Reaper Platform (Legacy)
# =============================================================================
platform:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/pgste/reaper/reaper-platform
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8081

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: platform.reaper.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  config:
    logLevel: info

  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# =============================================================================
# Decision-log pipeline (audit): agent NDJSON -> Vector sidecar -> ClickHouse
# =============================================================================
# One switch deploys the whole audit path (see deploy/decision-logs/ and
# docs/architecture/DECISION_LOG_PIPELINE.md):
#   - every agent pod captures decisions to a shared file and ships them via a
#     Vector sidecar (disk WAL + end-to-end acks; a store outage never blocks
#     the agent),
#   - a bundled single-node ClickHouse stores them (or point `clickhouse.url`
#     at your own / ClickHouse Cloud and set clickhouse.enabled=false),
#   - the management server's query API (GET /api/v1/orgs/{org}/decisions...)
#     is wired to the same store automatically.
decisionLogs:
  enabled: false

  # --- capture (agent) ---
  # Capture mode (the explicit intent knob; wins over sampleAllowRate):
  #   full    -> EVERY decision ships to the store, allows included (complete
  #              audit; sampling forced off) - the default here.
  #   sampled -> denies always; allows kept at sampleAllowRate.
  #   denies  -> denies only (minimal volume).
  mode: full
  sampleAllowRate: "1.0"     # used by mode=sampled; denies are never sampled
  inputData: false           # "explain" tier snapshot (denies-only by default)
  # Every record ships with this tenant_id. For the managed stack set it to the
  # org UUID so the control-plane query API (which scopes by org id) finds it;
  # leave "" for single-tenant self-host + REAPER_CLICKHOUSE_TENANT_FILTER=false
  # on the management server.
  tenantId: ""
  # Data protection (masking/pseudonymization/encryption; see
  # deploy/decision-logs/README.md). Secrets come from an existing Secret with
  # keys REAPER_DECISION_LOG_HASH_SALT and/or REAPER_DECISION_LOG_ENCRYPTION_KEY
  # (generate with: reaper-cli decisions keygen).
  hashPrincipal: false
  maskKeys: ""               # e.g. "ssn,password,token"
  encryptInputData: false
  protectionExistingSecret: ""

  # --- shipper (Vector sidecar on every agent pod) ---
  vector:
    image: timberio/vector:0.41.1-debian
    resources:
      requests: { cpu: 20m, memory: 64Mi }
      limits: { cpu: 200m, memory: 256Mi }
    bufferMaxBytes: "1073741824"   # 1 GiB disk WAL per pod (emptyDir)

  # --- immutable WORM archive (S3 Object-Lock) — SEC R2-3 anchor ---
  # The tamper-proof audit anchor: the SAME decisions + checkpoints are written
  # to an S3 bucket with Object Lock, which even an insider with ClickHouse write
  # access cannot rewrite or delete before retention expires. This is the copy a
  # regulator's `reaper-cli audit verify --file` runs ByteExact against for the
  # authoritative proof; cross-boot genesis linkage makes deleting a whole writer
  # boot detectable. DEFAULT off — but REGULATED DEPLOYMENTS MUST ENABLE THIS.
  worm:
    enabled: false
    bucket: ""                 # REQUIRED when enabled. The bucket MUST be created
                               # with Object Lock ENABLED + a default retention in
                               # COMPLIANCE mode (e.g. SOX 7y / HIPAA 6y).
    region: us-east-1
    endpoint: ""               # set for MinIO / S3-compatible stores
    retentionDays: 2555        # documents the bucket's Object-Lock window (~7y);
                               # actual enforcement lives on the S3 bucket policy
    keyPrefix: "decisions/"    # time-partitioned keys are appended (date/hour)

  # --- store (ClickHouse) ---
  clickhouse:
    enabled: true              # bundled single-node CH; disable to bring your own
    image: clickhouse/clickhouse-server:24.8
    url: ""                    # override when enabled=false (e.g. ClickHouse Cloud)
    database: reaper_audit
    username: reaper
    password: ""               # REQUIRED with bundled CH unless existingSecret set
    # Existing Secret with keys REAPER_CLICKHOUSE_USER / REAPER_CLICKHOUSE_PASSWORD
    existingSecret: ""
    retentionDays: 90          # TTL DELETE on the bundled store
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
    resources:
      requests: { cpu: 250m, memory: 1Gi }
      limits: { cpu: "2", memory: 4Gi }

# =============================================================================
# Reaper Agent
# =============================================================================
agent:
  # Standalone mode (connects to Platform)
  standalone:
    enabled: true
    replicaCount: 3

  # Managed mode (connects to Management Server)
  managed:
    enabled: false
    replicaCount: 3
    managementUrl: ""  # URL to Management Server
    organization: default
    apiKey: ""  # API key for authentication
    existingSecret: ""  # Use existing secret

  # Inbound authentication (Plan 01 Phase C). The agent refuses to start on
  # a non-loopback bind with auth disabled unless allowUnauthenticated
  # explicitly opts out. Production: set enabled=true and one credential.
  auth:
    enabled: false
    bearerToken: ""       # static token for callers (simple setups)
    jwtSecret: ""         # shared with management REAPER_JWT_SECRET (validates agent JWTs)
    allowUnauthenticated: true  # explicit opt-out preserving pre-auth behaviour

  image:
    repository: ghcr.io/pgste/reaper/reaper-agent
    tag: ""
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: agent.reaper.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  config:
    logLevel: info
    # Data-plane cold-start gate: when true the agent's /ready stays 503
    # until its first VERIFIED data snapshot lands, so Kubernetes keeps a
    # fresh pod out of rotation until its authorization data is loaded.
    # Leave false for agents that don't use the data plane.
    requireDataSync: false
    # Staleness budget for replicated authorization data (seconds; 0 = no
    # budget) and the behavior when exceeded: monitor | flag | enforce.
    dataMaxStalenessSecs: 0
    dataStalenessMode: monitor

  # ---------------------------------------------------------------------------
  # Unix Domain Socket transport (lower-latency same-host IPC).
  #
  # Two first-class deployment models (see docs/deployment/UDS_DEPLOYMENT.md):
  #   shards: 0 or 1  -> SHARED: one socket, multi-threaded runtime (best p99).
  #   shards: N (>1)  -> SHARDED: N sockets, one pinned single-thread runtime
  #                      each (~12-17% more throughput; clients round-robin).
  #
  # When enabled, the socket directory is mounted as a pod-local emptyDir so a
  # co-located sidecar (see the sidecar example) can reach it. The agent creates
  # the dir 0700 and chmods each socket to `permissions` — filesystem perms are
  # the ONLY access boundary (UDS has no application-layer auth).
  uds:
    enabled: false
    shards: 0            # 0/1 = shared; N>1 = sharded thread-per-core
    pinCores: true       # pin each shard runtime to a core (sharded only)
    socketDir: /run/reaper
    socketName: agent.sock
    permissions: "0660"  # 0660 = owner+group; use 0600 for owner-only

  openTelemetry:
    enabled: false
    endpoint: ""

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

# =============================================================================
# PostgreSQL (Bitnami subchart) — DEV-GRADE, single primary, no HA/backup
# =============================================================================
# For production use a managed HA Postgres (or the CloudNativePG cluster in
# deploy/kubernetes/postgres-cnpg.yaml): set `postgresql.enabled: false` and
# point `externalDatabase.url` at the HA endpoint. RPO/RTO targets and both
# paths are documented in docs/deployment/CONTROL_PLANE_HA_DR.md.
postgresql:
  enabled: true
  auth:
    username: reaper
    password: ""  # Auto-generated if empty
    database: reaper_management
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# =============================================================================
# External database (production path: managed HA Postgres or CNPG cluster)
# =============================================================================
# Used when postgresql.enabled=false. The URL should point at a stable
# primary endpoint that survives failover (a managed endpoint, or the
# CloudNativePG `reaper-pg-rw` Service). Prefer supplying the URL via
# management.secrets.existingSecret (key REAPER_DATABASE_URL) over putting
# credentials in values.
externalDatabase:
  url: ""

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true
  annotations: {}
  name: ""

# =============================================================================
# Metrics & Monitoring
# =============================================================================
metrics:
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 15s
    scrapeTimeout: 10s
    labels: {}

  prometheusRule:
    enabled: false
    namespace: ""
    labels: {}
    rules: []

# =============================================================================
# Network Policies
# =============================================================================
networkPolicy:
  enabled: false
  ingress:
    enabled: true
    namespaceSelector: {}
    podSelector: {}
  egress:
    enabled: true
    ports:
      - port: 53
        protocol: UDP
      - port: 443
        protocol: TCP
