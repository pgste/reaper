{{- if and .Values.platform.enabled .Values.platform.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "reaper.platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "reaper.platform.fullname" . }}
  minReplicas: {{ .Values.platform.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.platform.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.platform.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.platform.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
{{- end }}
