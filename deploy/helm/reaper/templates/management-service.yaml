{{- if .Values.management.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reaper.management.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
    app.kubernetes.io/component: management
spec:
  type: {{ .Values.management.service.type }}
  ports:
    - name: http
      port: {{ .Values.management.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "reaper.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: management
{{- end }}
