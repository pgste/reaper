{{- if .Values.agent.standalone.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reaper.agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
    app.kubernetes.io/mode: standalone
spec:
  type: {{ .Values.agent.service.type }}
  ports:
    - name: http
      port: {{ .Values.agent.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "reaper.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent
    app.kubernetes.io/mode: standalone
{{- end }}
---
{{- if .Values.agent.managed.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reaper.agent.fullname" . }}-managed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
    app.kubernetes.io/mode: managed
spec:
  type: {{ .Values.agent.service.type }}
  ports:
    - name: http
      port: {{ .Values.agent.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "reaper.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent
    app.kubernetes.io/mode: managed
{{- end }}
