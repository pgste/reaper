{{- if .Values.management.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reaper.management.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
    app.kubernetes.io/component: management
spec:
  {{- if not .Values.management.autoscaling.enabled }}
  replicas: {{ .Values.management.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "reaper.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: management
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/management-configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics/prometheus"
        {{- with .Values.management.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "reaper.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: management
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reaper.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.management.podSecurityContext | nindent 8 }}
      containers:
        - name: management
          image: {{ include "reaper.management.image" . }}
          imagePullPolicy: {{ .Values.management.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "reaper.management.fullname" . }}-config
            - secretRef:
                name: {{ .Values.management.secrets.existingSecret | default (printf "%s-secrets" (include "reaper.management.fullname" .)) }}
          volumeMounts:
            - name: storage
              mountPath: /var/lib/reaper/storage
          resources:
            {{- toYaml .Values.management.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.management.securityContext | nindent 12 }}
      volumes:
        - name: storage
          {{- if .Values.management.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "reaper.management.fullname" . }}-storage
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.management.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
