{{- if .Values.agent.standalone.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reaper.agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
    app.kubernetes.io/mode: standalone
spec:
  {{- if not .Values.agent.autoscaling.enabled }}
  replicas: {{ .Values.agent.standalone.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "reaper.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
      app.kubernetes.io/mode: standalone
  template:
    metadata:
      annotations:
        {{- with .Values.agent.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "reaper.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
        app.kubernetes.io/mode: standalone
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reaper.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.agent.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: {{ include "reaper.agent.image" . }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info,reaper_agent={{ .Values.agent.config.logLevel }}"
            - name: REAPER_BIND_ADDR
              value: "0.0.0.0:8080"
            - name: PLATFORM_URL
              value: "http://{{ include "reaper.platform.fullname" . }}:{{ .Values.platform.service.port }}"
            {{- if .Values.agent.openTelemetry.enabled }}
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_ENDPOINT
              value: {{ .Values.agent.openTelemetry.endpoint | quote }}
            {{- end }}
            {{- if .Values.agent.uds.enabled }}
            - name: REAPER_UDS_ENABLED
              value: "true"
            - name: REAPER_UDS_PATH
              value: "{{ .Values.agent.uds.socketDir }}/{{ .Values.agent.uds.socketName }}"
            - name: REAPER_UDS_SHARDS
              value: {{ .Values.agent.uds.shards | quote }}
            - name: REAPER_UDS_PIN_CORES
              value: {{ .Values.agent.uds.pinCores | quote }}
            - name: REAPER_UDS_PERMISSIONS
              value: {{ .Values.agent.uds.permissions | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.agent.uds.enabled }}
            - name: uds
              mountPath: {{ .Values.agent.uds.socketDir }}
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.agent.securityContext | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
        {{- if .Values.agent.uds.enabled }}
        # Pod-local socket dir shared with a co-located UDS client sidecar.
        - name: uds
          emptyDir: {}
        {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
---
{{- if .Values.agent.managed.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reaper.agent.fullname" . }}-managed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
    app.kubernetes.io/mode: managed
spec:
  {{- if not .Values.agent.autoscaling.enabled }}
  replicas: {{ .Values.agent.managed.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "reaper.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
      app.kubernetes.io/mode: managed
  template:
    metadata:
      annotations:
        {{- with .Values.agent.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "reaper.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
        app.kubernetes.io/mode: managed
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "reaper.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.agent.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: {{ include "reaper.agent.image" . }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info,reaper_agent={{ .Values.agent.config.logLevel }}"
            - name: REAPER_BIND_ADDR
              value: "0.0.0.0:8080"
            - name: REAPER_MANAGEMENT_ENABLED
              value: "true"
            - name: REAPER_MANAGEMENT_URL
              value: {{ .Values.agent.managed.managementUrl | default (printf "http://%s:%d" (include "reaper.management.fullname" .) (.Values.management.service.port | int)) | quote }}
            - name: REAPER_MANAGEMENT_ORG
              value: {{ .Values.agent.managed.organization | quote }}
            {{- if .Values.agent.managed.existingSecret }}
            - name: REAPER_MANAGEMENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agent.managed.existingSecret }}
                  key: api-key
            {{- else if .Values.agent.managed.apiKey }}
            - name: REAPER_MANAGEMENT_API_KEY
              value: {{ .Values.agent.managed.apiKey | quote }}
            {{- end }}
            {{- if .Values.agent.openTelemetry.enabled }}
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_ENDPOINT
              value: {{ .Values.agent.openTelemetry.endpoint | quote }}
            {{- end }}
            {{- if .Values.agent.uds.enabled }}
            - name: REAPER_UDS_ENABLED
              value: "true"
            - name: REAPER_UDS_PATH
              value: "{{ .Values.agent.uds.socketDir }}/{{ .Values.agent.uds.socketName }}"
            - name: REAPER_UDS_SHARDS
              value: {{ .Values.agent.uds.shards | quote }}
            - name: REAPER_UDS_PIN_CORES
              value: {{ .Values.agent.uds.pinCores | quote }}
            - name: REAPER_UDS_PERMISSIONS
              value: {{ .Values.agent.uds.permissions | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.agent.uds.enabled }}
            - name: uds
              mountPath: {{ .Values.agent.uds.socketDir }}
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.agent.securityContext | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
        {{- if .Values.agent.uds.enabled }}
        # Pod-local socket dir shared with a co-located UDS client sidecar.
        - name: uds
          emptyDir: {}
        {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
