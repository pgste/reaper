{{- if .Values.management.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "reaper.management.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
    app.kubernetes.io/component: management
data:
  RUST_LOG: "info,reaper_management={{ .Values.management.config.logLevel }}"
  REAPER_MANAGEMENT_PORT: {{ .Values.management.service.port | quote }}
  REAPER_MANAGEMENT_BIND_ADDRESS: "0.0.0.0"
  REAPER_STORAGE_TYPE: {{ .Values.management.config.storageType | quote }}
  REAPER_STORAGE_PATH: {{ .Values.management.config.storagePath | quote }}
  {{- with .Values.management.decisionLogs }}
  {{- if .clickhouseUrl }}
  REAPER_CLICKHOUSE_URL: {{ .clickhouseUrl | quote }}
  REAPER_CLICKHOUSE_DATABASE: {{ .clickhouseDatabase | default "reaper_audit" | quote }}
  {{- end }}
  {{- end }}
{{- end }}
