version: '3.9'

services:
  # Reaper Platform - Management & Deployment
  platform:
    build:
      context: .
      dockerfile: services/reaper-platform/Dockerfile
    container_name: reaper-platform
    ports:
      - "8081:8081"
    environment:
      - RUST_LOG=info,reaper_platform=debug
      - REAPER_BIND_ADDR=0.0.0.0:8081
    volumes:
      - platform-data:/data
    networks:
      - reaper-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Reaper Agent - Policy Enforcement
  agent:
    build:
      context: .
      dockerfile: services/reaper-agent/Dockerfile
    container_name: reaper-agent
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info,reaper_agent=debug
      - REAPER_BIND_ADDR=0.0.0.0:8080
      - PLATFORM_URL=http://platform:8081
      - REAPER_LOG_FORMAT=json  # Structured JSON logs for Loki
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317  # OpenTelemetry traces
    volumes:
      - agent-data:/data
      - ./policies:/policies:ro
    networks:
      - reaper-net
    depends_on:
      platform:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: reaper-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - reaper-net
    depends_on:
      - agent
      - platform
    restart: unless-stopped

  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: reaper-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/security-dashboard.json
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor  # Enable TraceQL for Tempo
    volumes:
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - reaper-net
    depends_on:
      - prometheus
      - loki
      - tempo
    restart: unless-stopped

  # Tempo - Distributed Tracing
  tempo:
    image: grafana/tempo:latest
    container_name: reaper-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"   # otlp grpc
      - "4318:4318"   # otlp http
    networks:
      - reaper-net
    restart: unless-stopped

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: reaper-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - reaper-net
    restart: unless-stopped

  # Promtail - Log Shipper (Optional)
  promtail:
    image: grafana/promtail:latest
    container_name: reaper-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - reaper-net
    depends_on:
      - loki
    restart: unless-stopped

networks:
  reaper-net:
    driver: bridge
    name: reaper-network

volumes:
  platform-data:
    name: reaper-platform-data
  agent-data:
    name: reaper-agent-data
  prometheus-data:
    name: reaper-prometheus-data
  grafana-data:
    name: reaper-grafana-data
  loki-data:
    name: reaper-loki-data
  tempo-data:
    name: reaper-tempo-data
