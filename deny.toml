# cargo-deny configuration — the blocking supply-chain gate (Plan 06, Step 1).
#
# Run locally with: `cargo deny check`
# CI runs `cargo deny check advisories licenses bans sources` as a required gate.
#
# Complementary to the scheduled `cargo audit` run (Step 2): cargo-deny is the
# blocking PR gate across advisories+licenses+bans+sources; cargo-audit's cron
# is the continuous watch that catches CVEs disclosed AFTER a commit merges.
# Do not "dedupe" them by deleting the scheduled audit — they have distinct jobs.

[graph]
# Check all target triples we actually ship / build for, so a platform-specific
# advisory or license is not missed.
all-features = true

[advisories]
version = 2
# RustSec advisory DB (https://github.com/rustsec/advisory-db). In version 2,
# vulnerabilities and unsound advisories are always errors; yanked crates are
# denied here. Suppress a specific advisory only with a dated justification in
# `ignore`, per docs/security/VULN_RESPONSE.md — never blanket-mute.
yanked = "deny"
ignore = [
    # ── rustls-webpki 0.101.7 (three advisories, one root cause) ──────────────
    # ALL of these come from a SINGLE vulnerable crate, rustls-webpki 0.101.7,
    # pulled ONLY transitively via aws-smithy-http-client (the AWS Rust SDK's
    # HTTPS connector, still on the legacy hyper-0.14 + rustls-0.21 stack even at
    # its latest version), and ONLY behind reaper-management's OPTIONAL
    # `storage-s3`/`storage-dynamodb` features. A default build (filesystem /
    # Postgres storage) never compiles this code. No downstream fix exists — the
    # AWS SDK controls the rustls version and feature unification prevents
    # swapping the connector. Tracked for a clean `cargo update` removal once the
    # AWS SDK adopts rustls 0.23. See docs/security/VULN_RESPONSE.md.
    #
    # RUSTSEC-2026-0104: reachable panic in CRL parsing (…::from_der). The
    # advisory states applications that do not use CRLs are unaffected; Reaper
    # uses the AWS SDK purely as a TLS client and never parses CRLs → unreachable.
    "RUSTSEC-2026-0104",
    # RUSTSEC-2026-0098 / -0099: certificate name-constraint validation bugs
    # (URI-name constraints ignored; constraints wrongly accepted for wildcard
    # names). These ARE in the cert-verification path the AWS TLS client uses, so
    # unlike -0104 they are not "cannot affect us". Residual risk is very low:
    # exploiting them requires a TRUSTED, name-constrained CA to mis-issue a cert
    # outside its constraints (post-signature-verification) and an attacker able
    # to MITM the AWS endpoint — and, again, only in builds that opt into the AWS
    # storage backends. Accepted as low risk pending the AWS SDK rustls bump.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",

    # RUSTSEC-2025-0134: rustls-pemfile is UNMAINTAINED (archived Aug 2025) — a
    # maintenance signal, NOT a vulnerability (no CVE). It is a thin wrapper over
    # rustls-pki-types' PEM parsing, pulled by axum-server (latest, 0.8) for TLS
    # cert loading; there is no way to drop it without replacing axum-server.
    # Every other advisory the gate surfaced was fixed at the source instead of
    # ignored — protobuf (→ prometheus 0.14), git2 unsound (→ 0.21),
    # atomic-polyfill/http-types/instant (→ postcard no-default-features +
    # wiremock 0.6), proc-macro-error (→ tabled 0.17). Revisit when axum-server
    # migrates off rustls-pemfile.
    "RUSTSEC-2025-0134",

    # RUSTSEC-2026-0173: proc-macro-error2 is UNMAINTAINED (the maintained fork of
    # proc-macro-error was itself just archived) — a maintenance signal, NOT a
    # vulnerability (no CVE). It is a BUILD-TIME proc-macro helper pulled by
    # tabled_derive → tabled (reaper-cli table rendering); it is not in any
    # shipped binary. Every tabled version pulls an unmaintained proc-macro-error
    # variant (0.16 pulled the original, 0.21 pulls this fork), so there is no
    # better option short of replacing tabled — not warranted for a build-time
    # dep. Revisit if tabled migrates (e.g. to manyhow) or we swap table crates.
    "RUSTSEC-2026-0173",

    # RUSTSEC-2024-0436: paste is UNMAINTAINED (author archived the repo Dec 2024)
    # — a maintenance signal, NOT a vulnerability (no CVE). It is a BUILD-TIME
    # proc-macro helper pulled ONLY by utoipa-axum 0.2 (the OpenAPI contract
    # generator added in Plan 07); it emits no runtime code and is not in any
    # shipped binary. utoipa-axum uses paste in its `routes!` macro and every
    # published version depends on it, so there is no drop-in fix short of
    # replacing utoipa-axum. paste is feature-complete and stable (dtolnay
    # archived it precisely because it was "done"). Revisit if utoipa-axum moves
    # off paste. See docs/security/VULN_RESPONSE.md.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Permissive-only allow-list, seeded from the actual dependency tree
# (`cargo metadata` license survey, 2026-07). Every crate resolves to one of
# these; copyleft-triggering terms are intentionally absent. `r-efi`'s
# "MIT OR Apache-2.0 OR LGPL-2.1-or-later" resolves via MIT/Apache — no
# copyleft obligation is taken.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "BSL-1.0",
    "BlueOak-1.0.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Per-crate license carve-outs go here with a justification. Empty by design —
# a new copyleft dep must be an explicit, reviewed decision, not a silent add.
exceptions = []
# Reaper's own workspace crates are unpublished and carry no `license` field;
# don't license-check our first-party code, only third-party dependencies.
private = { ignore = true }

[bans]
# Duplicate transitive versions are common and mostly benign; surface them as a
# warning (visibility) rather than blocking. Escalate to "deny" for specific
# crates via `deny` below if a duplication becomes a real hazard.
multiple-versions = "warn"
# Deny `version = "*"` on third-party crates (an unpinned supply-chain hole),
# but allow it for our own intra-workspace path deps, which legitimately use it.
wildcards = "deny"
allow-wildcard-paths = true
# Crates we never want pulled in (add with a reason as needed).
deny = []
skip = []
skip-tree = []

[sources]
# Supply-chain source control (ADR-5): only the public crates.io registry is
# allowed. There are currently NO git dependencies; a new one must be added here
# AND rev-pinned in Cargo.toml, or `cargo deny check sources` fails.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
