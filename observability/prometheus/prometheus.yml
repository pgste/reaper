global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'reaper-dev'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load alert rules
rule_files:
  - '/etc/prometheus/alerts.yml'

# Scrape configurations
scrape_configs:
  # Reaper Agent metrics (standalone)
  - job_name: 'reaper-agent'
    static_configs:
      - targets: ['agent:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s  # High frequency for sub-microsecond tracking

  # Reaper Agent metrics (managed mode)
  - job_name: 'reaper-agent-managed'
    static_configs:
      - targets: ['agent-managed:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Reaper Platform metrics
  - job_name: 'reaper-platform'
    static_configs:
      - targets: ['platform:8081']
    metrics_path: '/metrics/prometheus'
    scrape_interval: 10s

  # Reaper Management Server metrics
  - job_name: 'reaper-management'
    static_configs:
      - targets: ['management:3000']
    metrics_path: '/metrics/prometheus'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana monitoring
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
