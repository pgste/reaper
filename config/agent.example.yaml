# Reaper Agent Configuration Example
# Copy to /etc/reaper/agent.yaml or specify with --config

agent:
  # Agent name for identification
  name: reaper-agent-001
  # Port to listen on
  port: 8080
  # Address to bind to. Default is 127.0.0.1 (loopback): exposing the agent
  # beyond the host requires inbound auth below (or an explicit opt-out).
  bind_address: 0.0.0.0

# Inbound authentication for the agent HTTP API (Plan 01 Phase C).
# A non-loopback bind_address with auth disabled refuses to start unless
# allow_unauthenticated explicitly opts out.
auth:
  enabled: true
  # Accepted credentials: mtls | bearer_token | both
  mode: both
  # Static token for simple setups (callers send "Authorization: Bearer <token>")
  # bearer_token: change-me
  # Shared secret validating management-minted agent JWTs — same value as the
  # management server's REAPER_JWT_SECRET.
  # jwt_secret: change-me-32-bytes-minimum!!!!!
  # Trusted-proxy mTLS: header carrying the proxy-verified client-cert
  # fingerprint (only when the proxy strips client-supplied copies).
  # mtls_fingerprint_header: x-client-cert-fingerprint
  # mtls_allowed_fingerprints: ["sha256:..."]
  # Explicit, auditable opt-out for unauthenticated non-loopback serving:
  # allow_unauthenticated: true
  # Sidecar posture: keep the policy-evaluation hot path
  # (/api/v1/messages, /fast-messages, /batch-messages, /check) open with zero
  # auth overhead while inbound auth still gates the management plane (bundle/
  # policy/data deploy + mutation). Bundle signing is enforced on the deploy
  # path regardless. Env: REAPER_AGENT_AUTH_OPEN_DATA_PLANE=true
  # open_data_plane: true

policies:
  # Directory to load policies from on startup
  # bootstrap_dir: /etc/reaper/policies
  # Directory to cache deployed policies
  # cache_dir: /var/cache/reaper/policies
  # Watch for file changes and auto-reload
  watch_for_changes: false
  # Recognized policy file extensions
  extensions:
    - reap
    - yaml
    - yml
    - json

data:
  # File to load entity data from on startup
  # bootstrap_file: /etc/reaper/data/entities.json
  # Directory containing entity data files
  # bootstrap_dir: /etc/reaper/data
  # Directory to cache synced entity data
  # cache_dir: /var/cache/reaper/data

performance:
  # Target latency for monitoring (microseconds)
  target_latency_microseconds: 1.0
  # Number of worker threads (0 = auto-detect)
  worker_threads: 0
  # Enable SIMD optimizations
  enable_simd: true

cache:
  # Enable decision caching
  enabled: true
  # Maximum cached decisions
  capacity: 10000
  # TTL for cached decisions (seconds, 0 = no TTL)
  ttl_seconds: 10

observability:
  # Enable Prometheus metrics endpoint
  enable_metrics: true
  # Use structured JSON logging
  json_logging: false
  # Log level: trace, debug, info, warn, error
  log_level: info
  # Enable OpenTelemetry tracing
  enable_tracing: false
  # OpenTelemetry collector endpoint
  # otel_endpoint: http://localhost:4317
