# Simple Role-Based Access Control (RBAC) Policy
# Demonstrates basic role checks and ownership rules

name: rbac_simple
version: "1.0.0"
description: "Simple role-based access control with ownership"

# Default to deny - secure by default
default_decision: deny

rules:
  # Admins can do anything
  - name: admin_full_access
    description: "Administrators have full access"
    decision: allow
    condition:
      operator: equal
      left:
        entity: user
        attribute: role
      right:
        value: "admin"

  # Managers can read reports
  - name: manager_reports
    description: "Managers can access reports"
    decision: allow
    condition:
      operator: and
      conditions:
        - operator: equal
          left:
            entity: user
            attribute: role
          right:
            value: "manager"
        - operator: equal
          left:
            entity: resource
            attribute: type
          right:
            value: "report"

  # Users can access their own resources
  - name: user_own_resources
    description: "Users can access resources they own"
    decision: allow
    condition:
      operator: equal
      left:
        entity: user
        attribute: id
      right:
        entity: resource
        attribute: owner_id

  # Viewers get read-only access
  - name: viewer_read
    description: "Viewers can read any resource"
    decision: allow
    condition:
      operator: and
      conditions:
        - operator: equal
          left:
            entity: user
            attribute: role
          right:
            value: "viewer"
        - operator: equal
          left:
            entity: context
            attribute: action
          right:
            value: "read"
