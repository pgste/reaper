name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  # Manual trigger so the push-only E2E job can be validated on a branch
  # before merging (it never runs on pull_request events).
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ==========================================================================
  # Build Docker Images
  # ==========================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: reaper-agent
            dockerfile: services/reaper-agent/Dockerfile
            context: .
          - name: reaper-platform
            dockerfile: services/reaper-platform/Dockerfile
            context: .
          - name: reaper-management
            dockerfile: services/reaper-management/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-service cache scope: without a scope every matrix service shares
          # one gha cache and concurrent jobs GC each other's blobs mid-build,
          # producing "failed to copy: cache entry no longer exists". ignore-error
          # keeps a transient cache export/import failure from failing the build.
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }},ignore-error=true
          platforms: linux/amd64,linux/arm64

  # ==========================================================================
  # Scan Images for Vulnerabilities
  # ==========================================================================
  # BLOCKING image scan (Plan 06, Step 5 / ADR-3). Runs on PRs too: because
  # images are built-but-not-pushed on PRs, we rebuild the image locally from
  # the shared buildx cache (fast) and scan that, so the scan always covers THIS
  # commit's image on every event — not a stale registry tag.
  scan-images:
    name: Scan Images
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service: [reaper-agent, reaper-platform, reaper-management]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          load: true
          tags: reaper-scan/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          platforms: linux/amd64

      # Gating pass: FAIL the build on a fixable CRITICAL/HIGH CVE.
      # ignore-unfixed avoids unactionable red builds on base-image CVEs with no
      # available patch (revisited as the base image matures) — never
      # continue-on-error.
      - name: Trivy scan (blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'reaper-scan/${{ matrix.service }}:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # Reporting pass: emit SARIF for the Security tab. exit-code stays 0 so an
      # upload hiccup can't mask the gating verdict above.
      - name: Trivy scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'reaper-scan/${{ matrix.service }}:ci'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ==========================================================================
  # E2E Tests with Docker Compose
  # ==========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # No `needs: build-images`: this job builds its own single-arch images via
    # `docker compose --build`, so gating it behind the slow multi-arch publish
    # build only serialized ~40 min of wait it never consumed. Runs on PRs too
    # (it used to be push-only, which let it rot undetected until it broke a
    # main build — PR coverage fails the PR that introduces a stale reference).

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        env:
          # Every E2E test signs up a fresh user from the runner's single IP;
          # the production default (5/hour/IP) would 429 the later tests.
          RATE_LIMIT_SIGNUP_PER_HOUR: 1000
          # Run the E2E control plane single-control so a bundle promote goes
          # live immediately (the deployment test asserts `promoted`). The
          # compose default stays dual_control for production; two-person
          # approval is covered by the in-process management integration tests.
          PROMOTION_APPROVAL: disabled
        run: |
          # The `management` profile brings up postgres + management (:3000) +
          # agent (:8080) — the two services the E2E suite drives. `--wait`
          # blocks until healthchecks pass instead of a fixed sleep.
          docker compose -f docker-compose.yml --profile management up -d --build --wait

      - name: Check service health
        run: |
          curl -f http://localhost:3000/health || exit 1  # management
          curl -f http://localhost:8080/health || exit 1  # agent

      - name: Run E2E tests
        run: |
          export REAPER_MANAGEMENT_URL=http://localhost:3000
          export REAPER_AGENT_URL=http://localhost:8080
          cargo test -p reaper-e2e-tests --test e2e_tests -- --test-threads=1

      - name: Collect logs on failure
        if: failure()
        run: |
          # --profile management is REQUIRED here: without it compose doesn't
          # know about the profiled services and `logs` captures nothing (the
          # reason the first failure produced an empty artifact). Dump container
          # states + exit codes too, so a boot crash is visible.
          docker compose -f docker-compose.yml --profile management ps -a || true
          docker compose -f docker-compose.yml --profile management logs --no-color > docker-logs.txt 2>&1 || true
          cat docker-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml --profile management down -v
