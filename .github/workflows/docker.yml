name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ==========================================================================
  # Build Docker Images
  # ==========================================================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: reaper-agent
            dockerfile: services/reaper-agent/Dockerfile
            context: .
          - name: reaper-platform
            dockerfile: services/reaper-platform/Dockerfile
            context: .
          - name: reaper-management
            dockerfile: services/reaper-management/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-service cache scope: without a scope every matrix service shares
          # one gha cache and concurrent jobs GC each other's blobs mid-build,
          # producing "failed to copy: cache entry no longer exists". ignore-error
          # keeps a transient cache export/import failure from failing the build.
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }},ignore-error=true
          platforms: linux/amd64,linux/arm64

  # ==========================================================================
  # Scan Images for Vulnerabilities
  # ==========================================================================
  scan-images:
    name: Scan Images
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write

    strategy:
      matrix:
        service: [reaper-agent, reaper-platform, reaper-management]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:main'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ==========================================================================
  # E2E Tests with Docker Compose
  # ==========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: |
          docker compose -f docker-compose.full.yml --profile managed up -d
          sleep 30  # Wait for services to be ready

      - name: Check service health
        run: |
          curl -f http://localhost:3000/health || exit 1
          curl -f http://localhost:8081/health || exit 1
          curl -f http://localhost:8080/health || exit 1

      - name: Run E2E tests
        run: |
          export REAPER_MANAGEMENT_URL=http://localhost:3000
          export REAPER_AGENT_URL=http://localhost:8082
          cargo test -p reaper-e2e-tests --test e2e_tests -- --test-threads=1

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.full.yml logs > docker-logs.txt
          cat docker-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.full.yml --profile managed down -v
