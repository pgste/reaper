# Test coverage gate (round-3 Plan 05 §4.9, Testing T5).
#
# Blocks a PR when workspace library coverage falls below a committed floor.
#
# WHAT THE NUMBER MEANS (read before raising it): this measures `--lib`
# coverage only — unit tests compiled into each crate. It DELIBERATELY excludes
# integration tests (which spawn binaries or need a DB), so modules whose tests
# live in `tests/*.rs` read LOW here even when they are thoroughly covered — e.g.
# `api/orgs.rs` (tenant scoping) shows ~6% under --lib but is exercised
# end-to-end by `tenant_isolation_tests`, and much of `reap/compiler/**` and
# `evaluators/reaper_dsl/**` is covered by the differential/parity integration
# suites. The floor is therefore a GLOBAL "don't fall off a cliff" guard, not a
# per-module target — a per-module floor on these --lib numbers would enshrine
# misleading lows. Baseline measured on main @ #83: 35.14% (13683/38938 lines).
#
# The floor ratchets only UP. To raise it: read the latest run's total, and bump
# COVERAGE_FLOOR below to just under the new measured value (a point or two of
# slack absorbs run-to-run noise). To make it per-module or more representative,
# switch the measurement to `--tests --exclude reaper-e2e-tests` (includes the
# integration suites; validate it is stable first, some suites are heavier under
# instrumentation) and gate on cobertura.xml per file.
#
# Deadlock-free as a required check: it triggers on EVERY pull_request with no
# path filter, so it always reports a status on the PR head commit. (A required
# check that is path-filtered never reports on an unrelated PR and blocks it
# forever — do not add `paths:` here while this is a required check.)

name: Coverage

on:
  pull_request: {}
  push:
    branches: [main]
  schedule:
    - cron: "31 5 * * 1" # weekly, Monday 05:31 UTC — trend line
  workflow_dispatch: {}

permissions:
  contents: read

env:
  GIT_LFS_SKIP_SMUDGE: "1"
  # Global --lib coverage floor (percent). Baseline 35.14% on main @ #83;
  # floored to 34 for ~1pt of run-to-run slack. Ratchet UP only.
  COVERAGE_FLOOR: "34"

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage floor (--lib, fail-under)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "reaper-coverage"
          cache-on-failure: true

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Measure coverage + enforce floor (blocking)
        run: |
          # --fail-under exits non-zero when total line coverage < the floor, so
          # this step (and the job) go red on a coverage cliff. Integration tests
          # are excluded (--lib) to keep the number stable and attributable; see
          # the header for why that undercounts integration-tested modules.
          mkdir -p coverage
          cargo tarpaulin --workspace --lib \
            --out Xml --out Html --output-dir coverage \
            --timeout 300 --engine llvm \
            --fail-under "${COVERAGE_FLOOR}" \
            2>&1 | tee coverage/tarpaulin.log

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
