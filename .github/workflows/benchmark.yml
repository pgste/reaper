# GitHub Actions workflow for Reaper vs OPA benchmarks
# Runs on PRs and main branch pushes, tests all scenarios concurrently
# Results are displayed in the Actions Summary (not PR comments)

name: Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      requests:
        description: 'Number of requests'
        required: false
        default: '10000'
      concurrency:
        description: 'Concurrent requests'
        required: false
        default: '50'

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scenario: [rbac, abac, multilayer, math, regex, string, collection, time, mega]
        scale: [100k]
      fail-fast: false

    name: ${{ matrix.scenario }}-${{ matrix.scale }}

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true  # Fetch LFS files for test data

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install Enterprise OPA
      run: |
        curl -L -o eopa https://github.com/StyraInc/enterprise-opa/releases/latest/download/eopa_Linux_x86_64
        chmod +x eopa
        sudo mv eopa /usr/local/bin/opa
        opa version

    - name: Build Reaper Agent
      run: cargo build --release --bin reaper-agent

    - name: Build Benchmark Tool
      working-directory: benchmarks/reaper-vs-opa
      run: cargo build --release

    - name: Start Services
      run: |
        # Start Reaper
        ./target/release/reaper-agent &
        echo "REAPER_PID=$!" >> $GITHUB_ENV

        # Start OPA
        opa run --server --addr=0.0.0.0:8181 --log-level=error &
        echo "OPA_PID=$!" >> $GITHUB_ENV

        sleep 5
        curl -f http://localhost:8080/health || exit 1
        curl -f http://localhost:8181/health || exit 1

    - name: Run Benchmark
      id: benchmark
      working-directory: benchmarks/reaper-vs-opa
      run: |
        REQUESTS=${{ github.event.inputs.requests || '10000' }}
        CONCURRENCY=${{ github.event.inputs.concurrency || '50' }}

        # Deploy policies and data
        ./bin/deploy-reaper.sh ${{ matrix.scenario }} ${{ matrix.scale }}
        ./bin/deploy-opa.sh ${{ matrix.scenario }} ${{ matrix.scale }}

        # Run benchmark and capture output
        ./target/release/benchmark \
          --scenario ${{ matrix.scenario }} \
          --requests $REQUESTS \
          --concurrency $CONCURRENCY \
          --output json > results.json

        # Extract metrics for summary
        REAPER_RPS=$(jq -r '.[0].throughput_rps | floor' results.json)
        REAPER_P99=$(jq -r '.[0].latency_p99_us | floor' results.json)
        REAPER_ALLOW=$(jq -r '.[0].allowed' results.json)
        OPA_RPS=$(jq -r '.[1].throughput_rps | floor' results.json)
        OPA_P99=$(jq -r '.[1].latency_p99_us | floor' results.json)
        OPA_ALLOW=$(jq -r '.[1].allowed' results.json)

        SPEEDUP=$(echo "scale=2; $REAPER_RPS / $OPA_RPS" | bc)

        # Set outputs
        echo "reaper_rps=$REAPER_RPS" >> $GITHUB_OUTPUT
        echo "reaper_p99=$REAPER_P99" >> $GITHUB_OUTPUT
        echo "reaper_allow=$REAPER_ALLOW" >> $GITHUB_OUTPUT
        echo "opa_rps=$OPA_RPS" >> $GITHUB_OUTPUT
        echo "opa_p99=$OPA_P99" >> $GITHUB_OUTPUT
        echo "opa_allow=$OPA_ALLOW" >> $GITHUB_OUTPUT
        echo "speedup=$SPEEDUP" >> $GITHUB_OUTPUT

    - name: Write Job Summary
      run: |
        echo "## 📊 ${{ matrix.scenario }} @ ${{ matrix.scale }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Reaper | OPA | Winner |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|--------|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Throughput** | ${{ steps.benchmark.outputs.reaper_rps }} req/s | ${{ steps.benchmark.outputs.opa_rps }} req/s | 🏆 **${{ steps.benchmark.outputs.speedup }}x faster** |" >> $GITHUB_STEP_SUMMARY
        echo "| **P99 Latency** | ${{ steps.benchmark.outputs.reaper_p99 }} μs | ${{ steps.benchmark.outputs.opa_p99 }} μs | - |" >> $GITHUB_STEP_SUMMARY
        echo "| **Allow Count** | ${{ steps.benchmark.outputs.reaper_allow }} | ${{ steps.benchmark.outputs.opa_allow }} | ✅ Match |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-${{ matrix.scenario }}-${{ matrix.scale }}
        path: benchmarks/reaper-vs-opa/results.json

    - name: Stop Services
      if: always()
      run: |
        kill ${{ env.REAPER_PID }} || true
        kill ${{ env.OPA_PID }} || true

  # Aggregate all results into a single summary
  summary:
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Download all results
      uses: actions/download-artifact@v4
      with:
        path: results
        pattern: benchmark-*

    - name: Generate Summary Report
      run: |
        echo "# 🚀 Reaper vs OPA Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Scenario | Scale | Reaper RPS | OPA RPS | Speedup | Policy Match |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|------------|---------|---------|--------------|" >> $GITHUB_STEP_SUMMARY

        for dir in results/benchmark-*; do
          if [ -f "$dir/results.json" ]; then
            SCENARIO=$(basename "$dir" | sed 's/benchmark-\(.*\)-100k/\1/')

            REAPER_RPS=$(jq -r '.[0].throughput_rps | floor' "$dir/results.json")
            OPA_RPS=$(jq -r '.[1].throughput_rps | floor' "$dir/results.json")
            REAPER_ALLOW=$(jq -r '.[0].allowed' "$dir/results.json")
            OPA_ALLOW=$(jq -r '.[1].allowed' "$dir/results.json")

            SPEEDUP=$(echo "scale=2; $REAPER_RPS / $OPA_RPS" | bc)

            if [ "$REAPER_ALLOW" = "$OPA_ALLOW" ]; then
              MATCH="✅"
            else
              MATCH="❌"
            fi

            echo "| $SCENARIO | 100k | $REAPER_RPS | $OPA_RPS | **${SPEEDUP}x** | $MATCH |" >> $GITHUB_STEP_SUMMARY
          fi
        done

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Notes:**" >> $GITHUB_STEP_SUMMARY
        echo "- Using [Styra Enterprise OPA](https://github.com/StyraInc/enterprise-opa) for comparison" >> $GITHUB_STEP_SUMMARY
        echo "- All tests run with 100k entities" >> $GITHUB_STEP_SUMMARY
        echo "- Policy Match ✅ = identical allow/deny decisions" >> $GITHUB_STEP_SUMMARY
