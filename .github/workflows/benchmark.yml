# GitHub Actions workflow for Reaper vs OPA benchmarks
# Results published to Allure Reports on GitHub Pages

name: Benchmark

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
  workflow_dispatch:
    inputs:
      requests:
        description: 'Number of requests'
        required: false
        default: '10000'
      concurrency:
        description: 'Concurrent requests'
        required: false
        default: '50'

permissions:
  contents: write
  pages: write
  id-token: write

# Belt-and-braces: never smudge Git-LFS content here. The 100k benchmark data
# is ALWAYS regenerated at runtime (see the "Generate benchmark data" step),
# so the data/100k LFS pointers must stay pointers — downloading them burns
# the repo's LFS bandwidth budget for files the jobs immediately overwrite.
env:
  GIT_LFS_SKIP_SMUDGE: "1"

jobs:
  # Build agent and benchmark tools in parallel
  build-agent:
    name: Build Reaper Agent
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-agent-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Reaper Agent
      run: cargo build --release --bin reaper-agent

    - name: Upload Reaper Agent
      uses: actions/upload-artifact@v4
      with:
        name: reaper-agent
        path: target/release/reaper-agent

  build-benchmark:
    name: Build Benchmark Tools
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-benchmark-${{ hashFiles('**/Cargo.lock') }}

    - name: Build Benchmark Tools
      working-directory: benchmarks/reaper-vs-opa
      run: cargo build --release

    - name: Upload Benchmark Binaries
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-tools
        path: |
          benchmarks/reaper-vs-opa/target/release/benchmark
          benchmarks/reaper-vs-opa/target/release/generate-data

  # reaper-wasm Node bindings, built once and shared by every scenario job
  # (F2: the in-process wasm leg of the comparison).
  build-wasm:
    name: Build reaper-wasm (Node bindings)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust with wasm32 target
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache Cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

    - name: Build reaper-wasm (wasm32, release)
      run: cargo build -p reaper-wasm --target wasm32-unknown-unknown --locked --release

    - name: Install wasm-bindgen-cli (pinned to the wasm-bindgen crate version)
      run: |
        # ~/.cargo/bin is in the cache above: a restored binary makes a plain
        # `cargo install` fail with "already exists". Skip when the pinned
        # version is already present; --force covers version drift.
        if ! wasm-bindgen --version 2>/dev/null | grep -q "0.2.126"; then
          cargo install wasm-bindgen-cli --version 0.2.126 --locked --force
        fi

    - name: Generate Node bindings
      run: >
        wasm-bindgen --target nodejs --out-dir pkg-node
        target/wasm32-unknown-unknown/release/reaper_wasm.wasm

    - name: Upload Node bindings
      uses: actions/upload-artifact@v4
      with:
        name: reaper-wasm-node-bench
        path: pkg-node/

  # Run benchmarks in parallel using pre-built binaries
  benchmark:
    name: ${{ matrix.scenario }}-${{ matrix.scale }}
    runs-on: ubuntu-latest
    needs: [build-agent, build-benchmark, build-wasm]

    strategy:
      matrix:
        scenario: [rbac, abac, multilayer, math, regex, string, collection, time, mega]
        scale: [100k]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Download Reaper Agent
      uses: actions/download-artifact@v4
      with:
        name: reaper-agent
        path: bin/

    - name: Download Benchmark Tools
      uses: actions/download-artifact@v4
      with:
        name: benchmark-tools
        path: benchmarks/reaper-vs-opa/bin/

    - name: Make binaries executable
      run: |
        chmod +x bin/reaper-agent
        chmod +x benchmarks/reaper-vs-opa/bin/benchmark
        chmod +x benchmarks/reaper-vs-opa/bin/generate-data

    - name: Install Enterprise OPA
      run: |
        # EOPA moved from StyraInc release binaries to the container image
        # at ghcr.io/open-policy-agent/eopa. Extract the binary from the
        # image (entrypoint tells us its path) so the rest of the workflow
        # keeps managing a plain local process.
        IMG=ghcr.io/open-policy-agent/eopa:latest
        docker pull "$IMG"
        BIN=$(docker inspect --format '{{if .Config.Entrypoint}}{{index .Config.Entrypoint 0}}{{else}}{{index .Config.Cmd 0}}{{end}}' "$IMG")
        echo "eopa binary in image: $BIN"
        CID=$(docker create "$IMG")
        docker cp "$CID:$BIN" ./eopa
        docker rm "$CID" >/dev/null
        chmod +x eopa
        sudo mv eopa /usr/local/bin/opa
        opa version

    - name: Generate Test Data
      working-directory: benchmarks/reaper-vs-opa
      run: |
        DATA_FILE="data/100k/${{ matrix.scenario }}.json"
        mkdir -p data/100k
        # Always regenerate to ensure seed entities required by validation tests are present
        ./bin/generate-data --count 100000 --output "$DATA_FILE" ${{ matrix.scenario }}
        ENTITY_COUNT=$(jq '.entities | length' "$DATA_FILE")
        echo "✓ Generated $ENTITY_COUNT entities"

    - name: Start Services
      run: |
        ./bin/reaper-agent &
        echo "REAPER_PID=$!" >> $GITHUB_ENV

        opa run --server --addr=0.0.0.0:8181 --log-level=error &
        echo "OPA_PID=$!" >> $GITHUB_ENV

        sleep 5
        curl -f http://localhost:8080/health || exit 1
        curl -f http://localhost:8181/health || exit 1

    - name: Run Benchmark
      id: benchmark
      working-directory: benchmarks/reaper-vs-opa
      run: |
        REQUESTS=${{ github.event.inputs.requests || '10000' }}
        CONCURRENCY=${{ github.event.inputs.concurrency || '50' }}

        ./bin/deploy-reaper.sh ${{ matrix.scenario }} ${{ matrix.scale }}
        ./bin/deploy-opa.sh ${{ matrix.scenario }} ${{ matrix.scale }}

        ./bin/benchmark \
          --scenario ${{ matrix.scenario }} \
          --requests $REQUESTS \
          --concurrency $CONCURRENCY \
          --output json > results.json

        # Extract metrics
        REAPER_RPS=$(jq -r '.[0].throughput_rps | floor' results.json)
        REAPER_P99=$(jq -r '.[0].latency_p99_us | floor' results.json)
        REAPER_P50=$(jq -r '.[0].latency_p50_us | floor' results.json)
        REAPER_ALLOW=$(jq -r '.[0].allowed' results.json)
        REAPER_DENY=$(jq -r '.[0].denied' results.json)

        OPA_RPS=$(jq -r '.[1].throughput_rps | floor' results.json)
        OPA_P99=$(jq -r '.[1].latency_p99_us | floor' results.json)
        OPA_P50=$(jq -r '.[1].latency_p50_us | floor' results.json)
        OPA_ALLOW=$(jq -r '.[1].allowed' results.json)

        SPEEDUP=$(echo "scale=2; $REAPER_RPS / $OPA_RPS" | bc)

        # Create Allure results
        mkdir -p allure-results

        # Generate Allure test result for this scenario
        cat > allure-results/${{ matrix.scenario }}-result.json << EOF
        {
          "uuid": "$(uuidgen)",
          "historyId": "${{ matrix.scenario }}-benchmark",
          "name": "${{ matrix.scenario }} Benchmark",
          "fullName": "benchmarks.${{ matrix.scenario }}",
          "status": "passed",
          "stage": "finished",
          "start": $(date +%s000),
          "stop": $(date +%s000),
          "labels": [
            {"name": "suite", "value": "Reaper vs OPA"},
            {"name": "feature", "value": "${{ matrix.scenario }}"},
            {"name": "severity", "value": "normal"},
            {"name": "scale", "value": "${{ matrix.scale }}"}
          ],
          "parameters": [
            {"name": "requests", "value": "$REQUESTS"},
            {"name": "concurrency", "value": "$CONCURRENCY"}
          ],
          "attachments": [],
          "links": []
        }
        EOF

        # Create environment properties
        cat > allure-results/environment.properties << EOF
        Scale=${{ matrix.scale }}
        Requests=$REQUESTS
        Concurrency=$CONCURRENCY
        ReaperVersion=0.1.0
        OPAVersion=Enterprise
        EOF

        # Create custom metrics file for Allure
        cat > allure-results/${{ matrix.scenario }}-metrics.json << EOF
        {
          "scenario": "${{ matrix.scenario }}",
          "scale": "${{ matrix.scale }}",
          "reaper": {
            "throughput_rps": $REAPER_RPS,
            "latency_p50_us": $REAPER_P50,
            "latency_p99_us": $REAPER_P99,
            "allowed": $REAPER_ALLOW,
            "denied": $REAPER_DENY
          },
          "opa": {
            "throughput_rps": $OPA_RPS,
            "latency_p50_us": $OPA_P50,
            "latency_p99_us": $OPA_P99,
            "allowed": $OPA_ALLOW
          },
          "speedup": $SPEEDUP,
          "policy_match": $([ "$REAPER_ALLOW" = "$OPA_ALLOW" ] && echo "true" || echo "false")
        }
        EOF

        echo "speedup=$SPEEDUP" >> $GITHUB_OUTPUT
        echo "reaper_rps=$REAPER_RPS" >> $GITHUB_OUTPUT
        echo "reaper_p50=$REAPER_P50" >> $GITHUB_OUTPUT
        echo "reaper_p99=$REAPER_P99" >> $GITHUB_OUTPUT
        echo "opa_rps=$OPA_RPS" >> $GITHUB_OUTPUT
        echo "opa_p50=$OPA_P50" >> $GITHUB_OUTPUT
        echo "opa_p99=$OPA_P99" >> $GITHUB_OUTPUT

    # In-process wasm leg (F2): the SAME request stream the HTTP rows used
    # (emitted by the same generate_request code — zero drift), replayed
    # through the reaper-wasm artifact. Decision accounting matches
    # send_reaper_request (errors fail closed to deny), so the allow-count
    # parity check against the Reaper HTTP row is meaningful.
    - name: Download reaper-wasm Node bindings
      uses: actions/download-artifact@v4
      with:
        name: reaper-wasm-node-bench
        path: crates/reaper-wasm/pkg-node/

    - name: Run wasm leg
      id: wasm
      working-directory: benchmarks/reaper-vs-opa
      run: |
        REQUESTS=${{ github.event.inputs.requests || '10000' }}
        ./bin/benchmark --emit-requests --scenario ${{ matrix.scenario }} \
          --requests $REQUESTS 2>/dev/null > wasm-requests.ndjson
        node bin/wasm-bench.mjs \
          --scenario ${{ matrix.scenario }} \
          --policy policies/reaper/${{ matrix.scenario }}.reap \
          --data data/100k/${{ matrix.scenario }}.json \
          --requests-file wasm-requests.ndjson > wasm-results.json
        cat wasm-results.json

        WASM_RPS=$(jq -r '.throughput_rps | floor' wasm-results.json)
        WASM_P50=$(jq -r '.latency_p50_us' wasm-results.json)
        WASM_P99=$(jq -r '.latency_p99_us' wasm-results.json)
        WASM_ALLOW=$(jq -r '.allowed' wasm-results.json)
        WASM_TIER=$(jq -r '.evaluator_tier' wasm-results.json)
        REAPER_ALLOW=$(jq -r '.[0].allowed' results.json)

        # Decision parity vs the Reaper HTTP row on the identical workload.
        if [ "$WASM_ALLOW" != "$REAPER_ALLOW" ]; then
          echo "::error::wasm/HTTP decision divergence: wasm allowed $WASM_ALLOW, HTTP allowed $REAPER_ALLOW"
          exit 1
        fi
        echo "wasm_rps=$WASM_RPS" >> $GITHUB_OUTPUT
        echo "wasm_p50=$WASM_P50" >> $GITHUB_OUTPUT
        echo "wasm_p99=$WASM_P99" >> $GITHUB_OUTPUT
        echo "wasm_tier=$WASM_TIER" >> $GITHUB_OUTPUT

        # Fold the wasm row into the scenario metrics file so the aggregate
        # report (allure-report job) renders it beside the reaper/opa stats.
        OPA_RPS=$(jq -r '.[1].throughput_rps' results.json)
        WASM_SPEEDUP=$(echo "scale=2; $WASM_RPS / $OPA_RPS" | bc)
        METRICS="allure-results/${{ matrix.scenario }}-metrics.json"
        jq --slurpfile w wasm-results.json --arg sp "$WASM_SPEEDUP" \
          '. + {wasm: {
                  throughput_rps: ($w[0].throughput_rps | floor),
                  latency_p50_us: $w[0].latency_p50_us,
                  latency_p99_us: $w[0].latency_p99_us,
                  allowed: $w[0].allowed,
                  denied: $w[0].denied,
                  evaluator_tier: $w[0].evaluator_tier,
                  transport: "in-process"
                },
                wasm_speedup: ($sp | tonumber),
                wasm_match: ($w[0].allowed == .reaper.allowed)}' \
          "$METRICS" > "$METRICS.tmp" && mv "$METRICS.tmp" "$METRICS"

    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.scenario }}
        path: benchmarks/reaper-vs-opa/allure-results/

    - name: Upload Raw Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-${{ matrix.scenario }}-${{ matrix.scale }}
        path: |
          benchmarks/reaper-vs-opa/results.json
          benchmarks/reaper-vs-opa/wasm-results.json

    - name: Write Job Summary
      run: |
        echo "## 📊 ${{ matrix.scenario }} @ ${{ matrix.scale }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Engine | Throughput | p50 | p99 | Speedup |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|------------|-----|-----|---------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Reaper (HTTP)** | ${{ steps.benchmark.outputs.reaper_rps }} req/s | ${{ steps.benchmark.outputs.reaper_p50 }}µs | ${{ steps.benchmark.outputs.reaper_p99 }}µs | **${{ steps.benchmark.outputs.speedup }}x** |" >> $GITHUB_STEP_SUMMARY
        echo "| **Reaper (wasm, in-process, ${{ steps.wasm.outputs.wasm_tier }})** | ${{ steps.wasm.outputs.wasm_rps }} req/s | ${{ steps.wasm.outputs.wasm_p50 }}µs | ${{ steps.wasm.outputs.wasm_p99 }}µs | |" >> $GITHUB_STEP_SUMMARY
        echo "| OPA | ${{ steps.benchmark.outputs.opa_rps }} req/s | ${{ steps.benchmark.outputs.opa_p50 }}µs | ${{ steps.benchmark.outputs.opa_p99 }}µs | baseline |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "_wasm row is single-threaded in-process replay of the identical request stream; HTTP rows include the wire. Decision parity (allow counts) between wasm and Reaper-HTTP is asserted in-job._" >> $GITHUB_STEP_SUMMARY

    - name: Stop Services
      if: always()
      run: |
        kill ${{ env.REAPER_PID }} || true
        kill ${{ env.OPA_PID }} || true

  # Transport comparison: TCP vs Unix domain socket, same process, same runner.
  # Reaper and OPA each bind BOTH transports at once; every scenario is benchmarked
  # back-to-back over TCP then UDS so the ONLY variable is the wire transport. This
  # isolates UDS's same-host latency win (no TCP/IP stack) without cross-runner noise.
  uds-comparison:
    name: UDS vs TCP - ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    needs: [build-agent, build-benchmark]

    strategy:
      matrix:
        scenario: [rbac, abac, multilayer, mega]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Download Reaper Agent
      uses: actions/download-artifact@v4
      with:
        name: reaper-agent
        path: bin/

    - name: Download Benchmark Tools
      uses: actions/download-artifact@v4
      with:
        name: benchmark-tools
        path: benchmarks/reaper-vs-opa/bin/

    - name: Make binaries executable
      run: |
        chmod +x bin/reaper-agent
        chmod +x benchmarks/reaper-vs-opa/bin/benchmark
        chmod +x benchmarks/reaper-vs-opa/bin/generate-data

    - name: Install Enterprise OPA
      run: |
        IMG=ghcr.io/open-policy-agent/eopa:latest
        docker pull "$IMG"
        BIN=$(docker inspect --format '{{if .Config.Entrypoint}}{{index .Config.Entrypoint 0}}{{else}}{{index .Config.Cmd 0}}{{end}}' "$IMG")
        CID=$(docker create "$IMG")
        docker cp "$CID:$BIN" ./eopa
        docker rm "$CID" >/dev/null
        chmod +x eopa
        sudo mv eopa /usr/local/bin/opa
        opa version

    - name: Generate Test Data
      working-directory: benchmarks/reaper-vs-opa
      run: |
        DATA_FILE="data/100k/${{ matrix.scenario }}.json"
        mkdir -p data/100k
        ./bin/generate-data --count 100000 --output "$DATA_FILE" ${{ matrix.scenario }}
        echo "✓ Generated $(jq '.entities | length' "$DATA_FILE") entities"

    - name: Start Services (TCP + UDS)
      run: |
        mkdir -p /tmp/opa-bench
        # Reaper binds TCP (8080) always, plus a UDS socket when enabled.
        REAPER_UDS_ENABLED=1 REAPER_UDS_PATH=/tmp/reaper-bench/agent.sock \
          ./bin/reaper-agent &
        echo "REAPER_PID=$!" >> $GITHUB_ENV

        # OPA accepts multiple --addr: bind TCP and a Unix socket simultaneously.
        opa run --server \
          --addr=0.0.0.0:8181 \
          --addr=unix:///tmp/opa-bench/opa.sock \
          --log-level=error &
        echo "OPA_PID=$!" >> $GITHUB_ENV

        # Wait for all four listeners (TCP + UDS on each engine).
        for i in $(seq 1 30); do
          curl -fs http://localhost:8080/health >/dev/null 2>&1 \
            && curl -fs http://localhost:8181/health >/dev/null 2>&1 \
            && curl -fs --unix-socket /tmp/reaper-bench/agent.sock http://localhost/health >/dev/null 2>&1 \
            && curl -fs --unix-socket /tmp/opa-bench/opa.sock http://localhost/health >/dev/null 2>&1 \
            && break
          sleep 1
        done
        curl -f http://localhost:8080/health
        curl -f --unix-socket /tmp/reaper-bench/agent.sock http://localhost/health
        curl -f --unix-socket /tmp/opa-bench/opa.sock http://localhost/health

    - name: Run TCP vs UDS Benchmark
      id: benchmark
      working-directory: benchmarks/reaper-vs-opa
      run: |
        REQUESTS=${{ github.event.inputs.requests || '10000' }}
        CONCURRENCY=${{ github.event.inputs.concurrency || '50' }}

        # Deploy once over TCP; both transports serve the same in-memory state.
        ./bin/deploy-reaper.sh ${{ matrix.scenario }} 100k
        ./bin/deploy-opa.sh ${{ matrix.scenario }} 100k

        # Same binary, same load, only the transport differs.
        ./bin/benchmark --scenario ${{ matrix.scenario }} \
          --requests $REQUESTS --concurrency $CONCURRENCY \
          --output json > tcp.json

        ./bin/benchmark --scenario ${{ matrix.scenario }} \
          --requests $REQUESTS --concurrency $CONCURRENCY \
          --reaper-url unix:/tmp/reaper-bench/agent.sock \
          --opa-url unix:/tmp/opa-bench/opa.sock \
          --output json > uds.json

        R_TCP_RPS=$(jq -r '.[0].throughput_rps | floor' tcp.json)
        R_TCP_P99=$(jq -r '.[0].latency_p99_us | floor' tcp.json)
        O_TCP_RPS=$(jq -r '.[1].throughput_rps | floor' tcp.json)
        R_UDS_RPS=$(jq -r '.[0].throughput_rps | floor' uds.json)
        R_UDS_P99=$(jq -r '.[0].latency_p99_us | floor' uds.json)
        O_UDS_RPS=$(jq -r '.[1].throughput_rps | floor' uds.json)

        # Reaper UDS-vs-TCP deltas (same process, back-to-back).
        RPS_GAIN=$(echo "scale=1; ($R_UDS_RPS - $R_TCP_RPS) * 100 / $R_TCP_RPS" | bc)
        P99_DROP=$(echo "scale=1; ($R_TCP_P99 - $R_UDS_P99) * 100 / $R_TCP_P99" | bc)

        {
          echo "## 🔌 UDS vs TCP — ${{ matrix.scenario }} @ 100k"
          echo ""
          echo "| Engine | Transport | Throughput | p99 (µs) |"
          echo "|--------|-----------|------------|----------|"
          echo "| **Reaper** | TCP | ${R_TCP_RPS} req/s | ${R_TCP_P99} |"
          echo "| **Reaper** | UDS | ${R_UDS_RPS} req/s | ${R_UDS_P99} |"
          echo "| OPA | TCP | ${O_TCP_RPS} req/s | — |"
          echo "| OPA | UDS | ${O_UDS_RPS} req/s | — |"
          echo ""
          echo "**Reaper UDS vs TCP:** throughput ${RPS_GAIN}%, p99 latency ${P99_DROP}% lower."
        } >> $GITHUB_STEP_SUMMARY

    - name: Upload Transport Results
      uses: actions/upload-artifact@v4
      with:
        name: uds-comparison-${{ matrix.scenario }}
        path: |
          benchmarks/reaper-vs-opa/tcp.json
          benchmarks/reaper-vs-opa/uds.json

    - name: Stop Services
      if: always()
      run: |
        kill ${{ env.REAPER_PID }} || true
        kill ${{ env.OPA_PID }} || true

  # Generate and publish Allure Report
  allure-report:
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()

    steps:
    - uses: actions/checkout@v4

    - name: Download all Allure results
      uses: actions/download-artifact@v4
      with:
        path: allure-results
        pattern: allure-results-*
        merge-multiple: true

    - name: Get Allure history
      uses: actions/checkout@v4
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Copy history
      run: |
        mkdir -p allure-results/history
        if [ -d "gh-pages/history" ]; then
          cp -r gh-pages/history/* allure-results/history/ || true
        fi

    - name: Install Allure CLI
      run: |
        curl -o allure-2.27.0.tgz -OLs https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.27.0/allure-commandline-2.27.0.tgz
        tar -zxvf allure-2.27.0.tgz
        sudo mv allure-2.27.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
        allure --version

    - name: Generate Allure Report
      run: |
        mkdir -p allure-history
        allure generate allure-results --clean -o allure-history

    - name: Create summary page
      run: |
        # Create a custom summary from metrics files
        cat > allure-history/widgets/summary.json << 'EOF'
        {
          "reportName": "Reaper vs OPA Benchmark",
          "testRuns": [],
          "statistic": {"failed": 0, "broken": 0, "skipped": 0, "passed": 9, "unknown": 0, "total": 9}
        }
        EOF

        # Generate summary table from all metrics
        echo "# 🚀 Reaper vs OPA Benchmark Results" > allure-history/SUMMARY.md
        echo "" >> allure-history/SUMMARY.md
        echo "| Scenario | Reaper RPS | Wasm RPS (in-proc) | Wasm p50/p99 µs | OPA RPS | Speedup | Wasm× | Match | Wasm match |" >> allure-history/SUMMARY.md
        echo "|----------|------------|--------------------|-----------------|---------|---------|-------|-------|------------|" >> allure-history/SUMMARY.md

        for f in allure-results/*-metrics.json; do
          if [ -f "$f" ]; then
            SCENARIO=$(jq -r '.scenario' "$f")
            R_RPS=$(jq -r '.reaper.throughput_rps' "$f")
            O_RPS=$(jq -r '.opa.throughput_rps' "$f")
            SPEEDUP=$(jq -r '.speedup' "$f")
            MATCH=$(jq -r '.policy_match' "$f")
            ICON=$([ "$MATCH" = "true" ] && echo "✅" || echo "❌")
            W_RPS=$(jq -r '.wasm.throughput_rps // "—"' "$f")
            W_P50=$(jq -r '.wasm.latency_p50_us // "—"' "$f")
            W_P99=$(jq -r '.wasm.latency_p99_us // "—"' "$f")
            W_SPEEDUP=$(jq -r 'if .wasm_speedup then "**\(.wasm_speedup)x**" else "—" end' "$f")
            W_MATCH=$(jq -r 'if has("wasm_match") then (if .wasm_match then "✅" else "❌" end) else "—" end' "$f")
            echo "| $SCENARIO | $R_RPS | $W_RPS | ${W_P50}/${W_P99} | $O_RPS | **${SPEEDUP}x** | $W_SPEEDUP | $ICON | $W_MATCH |" >> allure-history/SUMMARY.md
          fi
        done

    - name: Publish to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history

    - name: Post Report Link
      run: |
        REPO="${{ github.repository }}"
        echo "## 📈 Allure Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "View the full report: https://${REPO%/*}.github.io/${REPO#*/}/" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Also show summary table
        echo "### Quick Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Scenario | Reaper | Wasm (in-proc) | OPA | Speedup | Wasm× |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|--------|-----------------|-----|---------|-------|" >> $GITHUB_STEP_SUMMARY

        for f in allure-results/*-metrics.json; do
          if [ -f "$f" ]; then
            SCENARIO=$(jq -r '.scenario' "$f")
            R_RPS=$(jq -r '.reaper.throughput_rps' "$f")
            O_RPS=$(jq -r '.opa.throughput_rps' "$f")
            SPEEDUP=$(jq -r '.speedup' "$f")
            W_RPS=$(jq -r '.wasm.throughput_rps // "—"' "$f")
            W_SPEEDUP=$(jq -r 'if .wasm_speedup then "**\(.wasm_speedup)x**" else "—" end' "$f")
            echo "| $SCENARIO | $R_RPS | $W_RPS | $O_RPS | **${SPEEDUP}x** | $W_SPEEDUP |" >> $GITHUB_STEP_SUMMARY
          fi
        done
