# Performance regression tracking on the evaluation hot paths.
#
# Runs the core criterion micro-benchmarks (policy evaluation + ReBAC
# traversal) in bencher output format and feeds them to
# github-action-benchmark:
#   - on main: results are pushed to the gh-pages benchmark dashboard,
#     becoming the new baseline (this is the trend-over-time history)
#   - on every run: results are compared to the previous baseline in two
#     buckets with different sensitivities:
#       * eval-latency (end-to-end policy evaluation) — stable benches, so a
#         tight gate: WARN at +5%, FAIL at +10%. This is what guards eval perf.
#       * engine micro-ops (raw lookups, hot-swap, threaded, allocation) —
#         nanosecond-scale and noisy, so a loose gate: WARN +25%, FAIL +50%.
#     A third capture-only step records EVERY benchmark to a single history
#     dir (dev/bench/all) so the trend dashboard has one complete chart with
#     no point dropped; it never gates (the two buckets above enforce).
#
# The end-to-end HTTP throughput benchmark (vs OPA) lives in benchmark.yml;
# this workflow guards the engine's nanosecond-scale core specifically.

name: Perf Regression Tracking

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch: {}

permissions:
  contents: write
  deployments: write

jobs:
  microbench:
    name: Criterion micro-benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "reaper-bench"
          cache-on-failure: true

      - name: Run core benches (bencher format)
        run: |
          cargo bench -p policy-engine --bench policy_evaluation_bench \
            -- --output-format bencher | tee bench-output.txt
          cargo bench -p policy-engine --bench rebac_bench \
            -- --output-format bencher | tee -a bench-output.txt

      - name: Split benches into eval-latency (tight gate) and micro-ops (loose gate)
        run: |
          # EVAL-LATENCY: end-to-end "evaluate a policy" benches. Stable
          # run-to-run (±1-2%) and the thing that must not regress -> tight gate.
          CORE='simple_policy|complex_policy|policy_evaluation_performance|compiled_policy_allow_group_viewer|compiled_policy_deny_full_sweep|ast_policy_allow_group_viewer'
          grep -E "$CORE" bench-output.txt > bench-eval-core.txt
          # MICRO-OPS: raw graph lookups, hot-swap, threaded, allocation, and the
          # realistic-workload macro bench. These are nanosecond-scale and/or
          # variance-prone, so they jitter run-to-run and get a loose gate —
          # tracked for trend, but only failing on a gross (>=50%) regression.
          grep -vE "$CORE" bench-output.txt > bench-microbench.txt
          echo "== eval-latency (tight) =="; cat bench-eval-core.txt
          echo "== micro-ops (loose) =="; cat bench-microbench.txt

      - name: Eval-latency regression gate (warn +5% / fail +10%)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Eval latency (criterion)"
          tool: "cargo"
          output-file-path: bench-eval-core.txt
          # Separate history dir so this suite charts on its own.
          benchmark-data-dir-path: "dev/bench/eval-latency"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Baseline history is pushed only from main; branches compare
          # against the last main baseline without writing.
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          # Warn (comment) at +5%, fail the job at +10%. fail-threshold must be
          # >= alert-threshold; a bench between +5% and +10% comments but does
          # not fail, at or beyond +10% it fails.
          alert-threshold: "105%"
          fail-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: true
          summary-always: true
          max-items-in-chart: 100

      - name: Micro-op trend (warn +25% / fail +50%)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Engine micro-ops (criterion)"
          tool: "cargo"
          output-file-path: bench-microbench.txt
          benchmark-data-dir-path: "dev/bench/micro-ops"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          # Second benchmark step in the same job: the first step already
          # fetched (and, off main, locally committed to) gh-pages, so re-
          # fetching origin here is a non-fast-forward error. Reuse the branch
          # the first step set up instead.
          skip-fetch-gh-pages: true
          # Loose gate for the noisy ns-scale ops: warn at +25%, fail only on a
          # gross +50% regression (a real 1.5x slowdown, not measurement drift).
          alert-threshold: "125%"
          fail-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: true
          summary-always: true
          max-items-in-chart: 100

      - name: Full benchmark trend (capture every point, no gate)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          # One unified history dir holding EVERY benchmark, so the trend
          # dashboard shows the complete set on a single chart. The two steps
          # above are the CI gates; this one is capture-only and never fails
          # the job — it exists so no data point is lost from the trend.
          name: "All benchmarks (criterion)"
          tool: "cargo"
          output-file-path: bench-output.txt
          benchmark-data-dir-path: "dev/bench/all"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          # Third step in the job — reuse the gh-pages branch the first step set
          # up rather than re-fetching (non-fast-forward otherwise).
          skip-fetch-gh-pages: true
          # Capture-only: never comment, never fail. The threshold is set high
          # and fail-on-alert is off so this step records points regardless of
          # any regression (the gates above are what enforce).
          alert-threshold: "200%"
          comment-on-alert: false
          fail-on-alert: false
          summary-always: true
          max-items-in-chart: 100
