# Blocking perf regression gate — paired A/B on shared runners (Plan 08 Phase F).
#
# The trend dashboard (perf-tracking.yml) compares against numbers measured on
# a DIFFERENT shared runner days ago, so it can only warn (±25-33% machine
# variance). This gate removes that variance by construction: it benchmarks
# the PR's merge-base AND head in the SAME job on the SAME runner, minutes
# apart, and compares criterion's saved baselines statistically.
#
# Gate rule (scripts/perf_ab_gate.py): a benchmark fails when its head mean
# exceeds base mean by the threshold (10% for the stable eval-latency set,
# 50% for variance-prone micro-ops) AND the 95% confidence intervals do not
# overlap — a regression outside measurement noise. The script's --self-test
# runs first on every job and proves a clean synthetic +15% regression fails,
# so the gate's sensitivity is continuously verified (Plan 08 §3 DoD).
#
# If a dedicated runner ever materializes, only `runs-on` changes — the
# paired design still helps there too.

name: Perf Gate

on:
  pull_request:
    paths:
      - "crates/**"
      - "services/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/perf-gate.yml"
      - "scripts/perf_ab_gate.py"
      - "benchmarks/reaper-vs-opa/**"
  workflow_dispatch: {}

permissions:
  contents: read

# Never download Git-LFS content in this workflow. No perf job reads the
# benchmarks/reaper-vs-opa/data/100k LFS objects (benchmark.yml regenerates
# that data with generate-data where it is needed), but git branch/SHA
# switching re-materializes the working tree and runs the LFS smudge filter,
# re-downloading ~500 MB the job never uses — burning the repo's LFS
# bandwidth budget on every run and failing outright once it is exhausted.
env:
  GIT_LFS_SKIP_SMUDGE: "1"

concurrency:
  group: perf-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ab-gate:
    name: Paired A/B criterion gate (merge-base vs head)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout PR head (full history for merge-base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "reaper-bench"
          cache-on-failure: true

      - name: Gate self-test (synthetic +15% regression must fail)
        run: python3 scripts/perf_ab_gate.py --self-test

      - name: Benchmark merge-base (baseline "base")
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
          BASE_SHA="$(git merge-base HEAD "origin/${BASE_REF}")"
          echo "merge-base with origin/${BASE_REF}: ${BASE_SHA}"
          git checkout --quiet "${BASE_SHA}"
          cargo bench -p policy-engine --bench policy_evaluation_bench -- --save-baseline base
          cargo bench -p policy-engine --bench rebac_bench -- --save-baseline base

      - name: Benchmark PR head (baseline "head")
        run: |
          set -euo pipefail
          git checkout --quiet "${{ github.event.pull_request.head.sha || github.sha }}"
          cargo bench -p policy-engine --bench policy_evaluation_bench -- --save-baseline head
          cargo bench -p policy-engine --bench rebac_bench -- --save-baseline head

      - name: Compare baselines (blocking)
        run: python3 scripts/perf_ab_gate.py --criterion-dir target/criterion --base base --head head

  # Served-path HTTP A/B gate (Plan 08 §3 / PERF R2-P1-1). The criterion job
  # above gates the ENGINE slice; this sibling job gates the REQUEST-TOTAL
  # path a client actually experiences — JSON deser, policy lookup, decision
  # cache, audit capture, response serialization — by driving the slo-harness
  # `slo-targeted` scenario (1k DSL policies, reduced N) against a release
  # agent built from the merge-base AND from the PR head, interleaved
  # base/head/base/head... in the SAME job on the SAME runner. The harness and
  # policy set are built ONCE from the PR head so the measuring instrument is
  # identical on both sides; only the agent under test changes.
  #
  # Gate rule (scripts/perf_ab_gate.py --http-ab): regression iff
  # median(head p99) > median(base p99) * 1.25 AND min(head) > max(base) —
  # every head run slower than every base run, the sample analog of
  # non-overlapping confidence intervals. HTTP loopback jitters more than
  # in-process criterion, hence the looser 25% threshold; the paired design
  # still cancels machine-to-machine variance by construction.
  #
  # Added PR-CI time budget (~4-6 min warm): the two agent release builds are
  # incremental via the shared cache, the harness build is ~1 min, and the
  # measured phase is 6 short runs (3 per side × ~20-30 s each: agent start +
  # 1k-policy deploy + 5k requests). Cold-cache runs take longer (full release
  # builds) but run in parallel with the criterion job, not after it.
  http-slo-ab:
    name: Paired A/B served-path HTTP gate (slo-targeted @ 1k)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout PR head (full history for merge-base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "reaper-slo-ab"
          cache-on-failure: true
          workspaces: |
            .
            benchmarks/reaper-vs-opa

      - name: Gate self-test (incl. http-ab verdicts)
        run: python3 scripts/perf_ab_gate.py --self-test

      - name: Build harness + policy set from PR head (fixed instrument)
        working-directory: benchmarks/reaper-vs-opa
        run: |
          set -euo pipefail
          cargo build --release --bin slo-harness --bin generate-data
          cp target/release/slo-harness "$RUNNER_TEMP/slo-harness"
          ./target/release/generate-data --count 1000 \
            --output "$RUNNER_TEMP/slo-dsl-1k.json" \
            policy-set --language dsl --resource-prefix /slo/targeted

      - name: Build merge-base agent (baseline "base")
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
          BASE_SHA="$(git merge-base HEAD "origin/${BASE_REF}")"
          echo "merge-base with origin/${BASE_REF}: ${BASE_SHA}"
          git checkout --quiet "${BASE_SHA}"
          cargo build --release --bin reaper-agent
          cp target/release/reaper-agent "$RUNNER_TEMP/agent-base"

      - name: Build PR-head agent (baseline "head")
        run: |
          set -euo pipefail
          git checkout --quiet "${{ github.event.pull_request.head.sha || github.sha }}"
          cargo build --release --bin reaper-agent
          cp target/release/reaper-agent "$RUNNER_TEMP/agent-head"

      - name: Interleaved A/B runs (3 per side, same runner)
        run: |
          set -euo pipefail
          run_once() { # $1 = agent binary, $2 = output json
            RUST_LOG=warn "$1" > /dev/null 2>&1 &
            AGENT_PID=$!
            for _ in $(seq 1 30); do
              curl -sf http://localhost:8080/health > /dev/null && break
              sleep 1
            done
            "$RUNNER_TEMP/slo-harness" --scenario slo-targeted \
              --policy-set "$RUNNER_TEMP/slo-dsl-1k.json" \
              --requests 5000 --concurrency 8 --warmup 1000 \
              --output json --save "$2"
            kill "$AGENT_PID" 2>/dev/null || true
            wait "$AGENT_PID" 2>/dev/null || true
          }
          # Interleave base/head so slow runner drift hits both sides equally.
          for i in 1 2 3; do
            run_once "$RUNNER_TEMP/agent-base" "$RUNNER_TEMP/base-$i.json"
            run_once "$RUNNER_TEMP/agent-head" "$RUNNER_TEMP/head-$i.json"
          done
          jq -s 'map(.[0])' "$RUNNER_TEMP"/base-*.json > "$RUNNER_TEMP/base-runs.json"
          jq -s 'map(.[0])' "$RUNNER_TEMP"/head-*.json > "$RUNNER_TEMP/head-runs.json"

      - name: Compare request-total p99 (blocking)
        run: |
          python3 scripts/perf_ab_gate.py --http-ab \
            --base-json "$RUNNER_TEMP/base-runs.json" \
            --head-json "$RUNNER_TEMP/head-runs.json" \
            --metric p99_us --http-threshold 1.25

      - name: Compare request-total p999 (blocking, tail)
        run: |
          # Round-3 Plan 05 §4.6: the tail (p999) is where a served-path
          # regression hides from p99. The paired A/B cancels runner variance by
          # construction (base+head on the SAME runner, interleaved), so a tail
          # gate is meaningful even on shared runners. The threshold is looser
          # than p99's (1.5x vs 1.25x) because the tail is intrinsically noisier;
          # the slo_harness already serializes p999_us for this saved JSON.
          python3 scripts/perf_ab_gate.py --http-ab \
            --base-json "$RUNNER_TEMP/base-runs.json" \
            --head-json "$RUNNER_TEMP/head-runs.json" \
            --metric p999_us --http-threshold 1.5

  # Cold-start gate (round-3 Plan 05 §4.6c, Testing T4 / ADR-4). Every other
  # latency path warms up first, so the documented <100ms cold-start / <10ms
  # bundle-load claims were unfalsified. This measures the UNWARMED first
  # bundle-load + first eval in a fresh process and fails past a committed
  # threshold. Thresholds are generous on shared runners (a huge-headroom
  # regression guard); a dedicated-hardware run tightens them via the
  # COLD_START_* env toward the real SLA.
  cold-start:
    name: Cold-start gate (unwarmed first request)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "reaper-bench"
          cache-on-failure: true

      - name: Measure cold start (blocking)
        run: cargo run -p policy-engine --release --example cold_start_bench
