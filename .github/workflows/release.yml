name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Correctness Gate — no release ships without it.
  # Full functional suite + the differential/oracle property suites at
  # 4x the per-push depth (see docs/development/CORRECTNESS.md).
  # ==========================================================================
  correctness-gate:
    name: Correctness Gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "reaper-release-gate"
          cache-on-failure: true

      - name: Functional suite (workspace)
        run: cargo test --workspace --lib

      - name: Golden corpus + suite runners
        run: |
          cargo test -p policy-engine \
            --test policy_library_tests \
            --test integration_runner \
            --test comparison_runner \
            --test compiled_evaluator_tests \
            --test comprehension_tests \
            --test rebac_tests \
            --test input_document_tests

      - name: Differential correctness at release depth (2000 cases)
        run: |
          PROPTEST_CASES=2000 cargo test -p policy-engine --release \
            --test differential_parity_tests \
            --test check_mode_differential_tests

      - name: Bench smoke (hot paths still build and run)
        run: |
          cargo bench -p policy-engine --bench rebac_bench \
            -- --output-format bencher --warm-up-time 0.2 --measurement-time 0.5

  # ==========================================================================
  # Create Release
  # ==========================================================================
  create-release:
    name: Create Release
    needs: correctness-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Reaper ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: |
            ## Reaper ${{ steps.get_version.outputs.version }}

            ### Installation

            #### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}/reaper-agent:${{ steps.get_version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/reaper-platform:${{ steps.get_version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/reaper-management:${{ steps.get_version.outputs.version }}
            ```

            #### Helm
            ```bash
            helm install reaper oci://ghcr.io/${{ github.repository }}/charts/reaper --version ${{ steps.get_version.outputs.version }}
            ```

            ### Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)

  # ==========================================================================
  # Build Release Binaries
  # ==========================================================================
  build-binaries:
    name: Build Binaries
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p reaper-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/reaper-cli dist/reaper-cli-${{ matrix.suffix }}
          cd dist && tar -czvf reaper-cli-${{ matrix.suffix }}.tar.gz reaper-cli-${{ matrix.suffix }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/reaper-cli-${{ matrix.suffix }}.tar.gz
          asset_name: reaper-cli-${{ matrix.suffix }}.tar.gz
          asset_content_type: application/gzip

  # ==========================================================================
  # Publish Helm Chart
  # ==========================================================================
  publish-helm:
    name: Publish Helm Chart
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          helm package deploy/helm/reaper --version ${{ needs.create-release.outputs.version }}

      - name: Push Helm chart
        run: |
          helm push reaper-${{ needs.create-release.outputs.version }}.tgz oci://ghcr.io/${{ github.repository }}/charts
