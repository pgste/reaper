# Reaper vs OPA Comparison Test Environment
#
# Usage:
#   docker compose up -d                    # Start both services
#   ./run-comparison.sh                     # Run comparison tests
#   docker compose down                     # Stop services
#
# Services:
#   - reaper: Reaper Agent on port 8080
#   - opa: Enterprise OPA on port 8181

services:
  # Reaper Agent - Policy Enforcement
  reaper:
    build:
      context: ../..
      dockerfile: services/reaper-agent/Dockerfile
    image: reaper-agent:latest
    container_name: reaper-comparison
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info,reaper_agent=debug
      - REAPER_BIND_ADDR=0.0.0.0:8080
    volumes:
      - ../../policies:/policies:ro
      - ../../test-data:/data:ro
    networks:
      - comparison-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Enterprise OPA - Policy Engine
  opa:
    image: ghcr.io/styrainc/enterprise-opa:latest
    container_name: opa-comparison
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
      - "/data"
    volumes:
      - ./opa_policies:/policies:ro
      - ./opa_data:/data:ro
    networks:
      - comparison-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  comparison-net:
    driver: bridge
    name: reaper-comparison-network
